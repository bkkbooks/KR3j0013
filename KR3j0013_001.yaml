body:
  text: 卷第一清神第一形者生之器也心者形之主也神者心之寶也故神靜而心和心和而形全神躁則心蕩心蕩則形傷將全其形先在理神故恬和飬神則自安於內清虛棲心則不誘於外神恬心清則形無纍矣虛室生白吉祥至矣人不照於爍金而照於瑩鏡者以瑩能明也不鑑於流波而鑑於靜水者以靜能清也鏡水以明清之性故能形物之形由此觀之神照則垢滅形靜則神清垢滅則內欲永盡神清則外纍不入今清歌奏而心樂悲聲發而心哀神居體而遇感推移以此而言之則情之變動自外至也夫一哀一樂猶搴正性況萬物之衆而能拔擢以生心神哉故萬人彎弧以向一鵠鵠能無中乎萬物眩曜以惑一生生能無傷乎七竅者精神之戶牗也志氣者五臟之使候也耳目之於聲色鼻口之於芳味肌體之於安適其情一也七竅於則精神馳鶩而不守志氣縻於趣捨則五臟滔蕩而不安嗜欲連綿於外心腑壅塞於內蔓衍於荒淫之波留連於是非之境而不敗德傷生者蓋亦寡矣是以聖人清目而不視靜耳而不聽閉口而不言棄心而不慮貴身而忘賤故尊勢不能動樂道而忘貧故厚利不能傾容身而處適情而遊一氣浩然純白於衷故形不飬而性自全心不勞而道自至也防欲第二人之稟氣必有性情性之所感者情也情之所安者欲也情出於性而情違性欲由於情而欲害情情之傷性性之妨情猶煙冰之與水火也煙生於火而煙鬱火冰出於水而冰遏水故煙微而火盛冰泮而水通性貞則精銷情熾則性滅是以珠瑩則塵埃不能附性明則情欲不能染也故林之性靜所以動者風搖之也水之性清所以濁者土渾之也人之性貞所以邪者欲眩之也身之有欲如樹之有蝎樹抱蝎則還自鑿身抱欲而返自害故蝎盛則木拆欲熾則身亡將收情欲先斂五關五關者情欲之路嗜好之府也目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼓口貪滋味命曰燻喉之煙身安輿駟命曰召蹶之機此五者所以飬生亦以傷生耳目之於聲色鼻口之於芳味肌體之於安適其情一也然亦以之死亦以之生或為賢智或為庸愚由干處之異也譬由愚者之飬魚鳥也見天之寒則內魚於溫湯之而棲鳥於火林之上水木者所以飬魚鳥也飬之失理必至燋爛聲色芳味所以悅人悅之過理還以害生故明者刳情以遣纍約欲以守貞食足以充虛接氣衣足以蓋形禦寒靡麗之華不以滑性哀樂之感不以亂神處於止足之泉立於無害之岸此全性之道也夫蜂蠆螫指則窮日煩擾蚊蟲𠾱膚則通宵失寐蚊蜂小害指膚外疾人入山則避蜂蠆入室則驅蚊虻何者以其害於體也嗜欲攻心正性顛倒嗜欲大害攻心內疾方於指膚亦以多也外疾之害輕於秋毫人知避之內疾之害重於泰山而莫之避是棄輕患而負重害不亦倒乎人有牛馬放逸不歸必知收之情欲放逸而不知收不亦惑乎將收情欲必在危微情欲之萌如木之將蘖火之始熒手可掣而斷露可滴而滅及其熾也結條凌雲煽煙章華雖窮力運斤竭池灌火而不能禁其勢盛也嗜欲之萌耳目可關而心意可鑰至於熾也雖襞情卷欲而不能收其性敗也如能塞先於未形禁欲於危微雖求侮吝其可得乎去情第三情者是非之主而利害之根有是必有非能利亦能害是非利害存於衷而彼此還相疑故無情以接物在遇而恆通有情以接人觸應而成礙由此觀之則情之所處物之所疑也是以謀揚譽人而受譽者不以為德身膚強飯而蒙飽者不以為惠嬰兒傷人而被傷者不以為怨侏儒嘲人而獲嘲者不以為辱何者挾利以為己有情於譽飽雖蒙惠而非德無情於傷辱雖獲毀而無憾魚不畏網而畏鵜復讎者不怨鏌鋣而怨其人網無心而鳥有情劍無情而人有心也使信士分財不如投策探鉤使廉士守藏不如間局全封何者有心之於平不若無心之不平也有欲之於廉不若無欲之不廉也今人目若驪珠心如權衡評人好醜雖言得其實彼必嫌怨及其自照明鏡摹倒其容醜狀既露則內慚而不怨向之評者與鏡無殊然而向怨今之慚者以鏡無情而人有心慚也三人居室二人交爭必取信於不爭者以辨彼此之得失夫不爭者未必平而交爭者未必偏而信於不爭者何也以爭者之心並挾勝情故也飄瓦擊人虛心觸已是以聖人棄智以全真遣情以接物不為名尸不為謀府混然無際而俗莫能纍矣韜光第四物之寓世未嘗不韜形滅影隱質遐外以全性棲命者也夫含奇佩美衒異露才者未有不以此傷性毀命者也故翠以羽自殘龜以智自害舟以含色磨肌石以抱玉碎質此四者生於異俗與人非不隔也託性於山林寄情於物外非有求於人也然而自貽伊患者未能隱其形也若使翠斂翮於明丘之林則解羽之患禮脫龜曳尾於暘谷之泥則鑽灼之患不至丹伏光於春山之底則磨肌之患禮絶石亢體於玄圃之巖則剖琢之憂不及故窮巖曲岫之梓榤生於積石穎貫青天根鑿黃泉分條布葉輪菌磊硊騏驎戲其下鵷鸞遊其顛浮雲棲其側清風激其間終歲無毫釐之憂免刀斧之害者非與人有德也能韜隱其質故致全性也路側之榆樵人採其條匠者伐其柯餘有尺蘗而為行人所折者非與人有讎也然而致寇者形不隱也周雞斷尾獲免犧牲山狙見巧終必招害由此言之則出處之理亦可知矣是以古之有德者韜迹隱智以密其外澄心封情以定其內內定則神腑不亂外密則形骸不擾以此處身不亦全乎崇學第五至道無言非立言無以明其理大象無形非立言無以側其奧道象之妙非言不津津言之妙非學不傳未有不因學而鑒道不假學以光身者也夫繭繅以為絲織為縑紈繢以黼黻則王侯服之人學為禮儀雕以文藻而世人榮之繭之不繅則素絲蠹於筐籠人之不學則才智腐於心胸海蚌未剖則明珠不顯崑竹未斷則鳳音不彰性情未鍊則神明不發譬諸金木金性苞水木性藏火故鍊金則水出鑽木而火生人能務學鑽鍊其性則才慧發矣青出於藍而青於藍染使然也冷生於水而冷於水寒使然也鏡出於金而明於金瑩使然也戎夷之子生而同聲長而異語教使然也山抱玉而草木潤焉川貯珠而岸不枯焉口納滋味而百節肥焉心受典誥而五性通焉故不登峻岑不知天之高不瞰深谷不知地之厚不遊六藝不知智之深遠而光華者節也近而愈明者學也故吳簳質徑非筈羽而不美越劍性利非淬礪而不銛人性悁慧非積學而不成沿淺以及深披暗而覩明不可以傳聞稱非得以汍濫善也夫遇鄉者心務見家不可以一步至也慕學者情纏典素不可以一讀能也故為山者基於一簣之土以成千丈之峭鑿井者起於三寸之坎以就萬仞之深靈珠如豆不見其長疊歲而大鐃舌如指不覺其損纍時而折懸巖滴溜終能穿石規車牽索卒至斷軸水非石之鑽繩非木之鋸然而斷穿者積漸之所成也耳形完而聽不聞者聾也目形全而視不見者盲也人性美而不監道者不學也耳之初窒目之始昧必不吝百金逆醫千里人不涉學猶心之聾盲不知遠祈明師以攻心術性之蔽也故宣尼臨沒手不釋卷仲舒垂卒口不輟誦有子惡臥自碎其掌蘇生患睡親錐其股以聖賢之性猶好學無倦矧庸人而可怠哉專學第六學者出於心心為身之主耳目候於心若心不在學則聽誦不聞視簡不見如欲鍊業必先正心而後理義入焉夫兩葉掩目則冥默無覩雙珠填耳心寂寞無聞葉作目蔽珠為耳鯁二關外擁視聽內隔故其宜也而離婁察秋毫之末不聞雷霆之聲季子聽清角之韻不見嵩岱之形視不關耳而耳不見聽不關目而目不聞者何也心溺秋毫意入清角故也是以心駐於目必忘其耳則聽不聞心駐於耳必遺其目則視不見也使左手畫方右手畫圓令一時俱成雖執規矩之心回剟劂之手而不能者由心不兩用則手不並運也奕秋通國之善奕也當奕之思有吹笙過者傾心聽之將圍未圍之際問以奕道則不知也非奕道暴深情有暫暗笙猾之也隸首天下之善算也當算之時有鳴鴻過者彎弧擬之將發未發之間問以三五則不知也非三五難算意有暴昧鴻亂之也奕秋之奕隸首之算窮微盡數非有差也然而心在笙鴻而奕敗算撓者是心不專一遊情外務也瞽無目而耳不可以察專於聽也聾無耳而目不可以聞專於視也以瞽聾之微而聽察聰明審者用心一也夫蟬難取而黏之如掇卷耳易採而不盈傾筐是故學者必精勤專心以入於神若心不在學而強諷誦雖入於耳而不諦於心譬若聾者之歌效人為之無以自樂雖出於口則越散矣
