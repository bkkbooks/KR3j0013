body:
  text: 卷第四知人第十八龍之潛也慶雲未附則與魚鱉為鄰驥之伏也孫陽未賞必與駑駘同櫪士之翳也知己未願亦與傭流雜處自非洞明莫能分也故明哲之相士聽之於未聞察之於未形而鋻其神智識其才能可謂知人矣若功成事遂然後知之者何異耳聞雷霆而稱為聰目見日月而謂之明乎故孔方諲之相馬也雖未追風逐電絕塵滅影而迅足之勢固已見矣薛燭之賞劍也雖未陸斬玄犀水截輕羽而銳刃之資亦已露矣故范蠡吠於犬竇文種聞而拜之鮑龍跪石而吟仲尼為之下車堯之知舜不違桑陰文王之知呂望不以永日眉䀹之微而形於色音聲之妙而動於心賢聖觀察不待成功而知之也陳平之棄楚歸漢魏無知識其善謀韓信之亡於黑水蕭何知其能將豈待吐六奇而後明破趙魏而方識哉若于臨機能謀而知其智犯難涉危乃見其勇是凡夫之識非明哲之鑒公輸之刻鳳也冠距未成翠羽未樹人見其身者謂之龍鵄見其首者名曰鴮鸅皆訾其醜而笑其拙及鳳之成翠冠雲聳朱距電搖錦身霞散綺翮焱發翽然一翥翻翔雲楝三日而不集然後讚其奇而稱其巧堯遭洪水浩浩滔天蕩蕩懷山下民昏墊禹為匹夫未有功名堯深知之使治水焉乃鑿龍門斬荊山導熊耳通鳥鼠櫛奔風沐驟雨而目黧䵟手足胼胝冠絓不睱取經門不及過使百川東注于海西被于流沙生人免為魚鱉之患於是眾人咸歌詠始知其賢故見其朴而知其巧者是王爾之知公輸也鳳成而知其巧者是眾人之知公輸也未有功而知其賢者是堯之知禹也有功而知其賢者是眾人之知禹也故知人之君未易遇也侯生夷門抱關之吏見知於無忌䂊子范中行之亡虜蒙異於智伯名尊而身顯榮滿於當世雖復刎頸魏庭添身趙地揣情酬德未報知己虛左之顧國士之遇也世之烈士願為君者授命猶瞽者之思視躄者之想行而目終不得開足不得伸徒自悲夫薦賢第十九國之需賢譬車之恃輪猶舟之倚楫也車摧輪則無以行舟無楫則無以濟國乏賢則無以理國之多賢如託造父之乘附越客之舟身不勞而千里可期足不行而蓬萊可至朝之乏賢若鳳虧六翮欲望背磨青天臆衝絳煙終莫由也峻極之山非一石所成凌雲之榭非一木所搆狐白之裘非一腋之毳宇宙為宅非一賢所治是以古之人君必招賢搜隱人臣則獻士舉知唐昇二八流睦睦之風周保十亂播濟濟之詠仲尼在衛趙鞅折謀千木處魏秦人罷兵宮奇未亡獻公不侵子玉猶存文公側坐以此而言則立政致治折衡厭難者舉賢之效也夫連城之壁瘞影荊山夜光之珠潛輝鬱浦玉無翼而飛珠無脛而行揚聲於章華之臺炫燿於綺羅之堂者蓋人君之舉也賢士有脛而不肯至殆蠹材於幽岫毀迹於柴蓽者蓋人不能自薦未有為之舉也古人競舉所知爭引其類才苟適治不問世冑智苟能謀奚妨秕行昔時人君拔奇於困虜握能於屠販內薦不避子外薦不避讎身受進賢之賞名有不朽之芳昔子貢問於孔子曰誰為大賢子曰齊有鮑叔鄭有子皮子貢曰齊無管仲鄭無子產乎子曰吾聞進賢為賢非賢為不肖鮑叔薦管仲子皮薦子產未聞二子有所舉也進賢為美逾身之賢矧復抑賢者乎故黔息碎首以明百里北郭刎頸以申晏嬰所以致命而不辭者為國薦士滅身無悔忠之至也德之難也臧文仲不進展禽仲尼謂之竊位公孫引董生汲黯將為妬賢虞丘不薦叔敖樊姬貶為不肖東閭不達髦士後行不正於路歸為國入寶不如能獻賢獻賢受上賞蔽賢蒙顯戮斯前識之良規後代之明鏡矣因顯第二十夫火以吹爇生焰鏡以瑩拂成鑑火不吹則無外耀之光鏡不瑩必闕內影之照故吹成火之光瑩為鏡之華人之寓代亦須聲譽以發光華猶此火鏡假吹瑩也今雖智如樗里才若賈生居環堵之室無知己之談望迹流於地聲聞於天不可得也柳下惠不遇仲尼則貞潔之行不顯未免於三黜之臣無恥之人也季布不遇曹丘則百金之諾不揚未離於凡虜無羞之士也二子所以德洽於當時而聲流於萬代者聖賢吹瑩也昔有賣良馬於市者已三旦矣而市人不顧乃謂伯樂曰吾賣良馬而市人莫賞子一顧請獻半馬之價於是伯樂造市來而迎睇之去而目送之一朝之價遂至千金此馬非昨為駑駘今成駃騠也由人莫之賞求有為之顧眄者也夫樟木盤根鉤枝癭節蠹皮輪箘擁腫則眾眼不顧匠者採焉製為殿堂塗以丹漆畫為黼藻則百辟卿士莫不顧眄仰視木性猶是也而昔賤今貴者良工為之容也荊磎之珠夜光之璧薦之侯王必藏之以玉匣緘之以金縢若闇以投人則莫不相眄以愕按劍而怒何者為無因而至故若物無所以因良馬勞於駔闠美材朽於幽谷寶珠觸於按劍名有所因而至則良馬一顧千金槃木光於紫殿璧珠擎之玉匣今人之居代雖抱才智幽鬱窮閨而無所因邪未有為之聲譽先之以吹瑩欲望身之光名之顯猶捫虛縛風煎湯覔雪豈可得乎託附第二十一夫含氣庶品未有不託附物勢以成其便者也故霜雁託於秋風以成輕舉之勢騰蛇附於春霧志希凌霄之遊蟨鼠附於蛩蛩以攀追日之步碧蘿附於青松以茂凌雲之葉與夫鳥獸蟲卉之智猶知因風假霧託峻附高以成其事奚況於人而無託附以就其名乎故所託英賢則跡光名顯所附闇蔽則身悴名朽天之始旭則目察輕煙歲之將暮則蓬卷雲中目之能見蓬之能高託日之光附風之勢也綴羽於金鐵置之於江湖必也沈溺陷於泥沙非羽質重而性沈所託沈也載石於舟置之江湖則披風截波汎颺長澗非石質輕而性浮所託浮也搏牛之䖟飛極百步若附鸞尾則一翥萬里非其翼工所託迅也樓季足捷追越奔光若駕疲羸則日不涉一舍非其脛遲所託蹇也是以觀之附得其所則重石可浮短翅能遠附失其所則輕羽淪溺迅足成蹇夫燕之巢幕衘泥補綴爛若綾紋雖陶匠逞玅不能為之可謂固矣然凱旋剔幕則巢破子裂者所託危也鷦鷯巢葦之莖紩之以絲髮珠圓羅縐雖女子運巧不能為之可謂固矣然䖟風欻至則葦拆卵破者何也所託輕弱使之然也故鳥有擇木之性魚有選潭之情所以務其翔集蓋斯為美也心隱第二十二二儀之大可以章程測也三綱之動可以圭表度也雷霆之聲可以鐘鼓傳也風雨之變可以音律和也故有象可觀不能匿其影有形可見不能限其跡有聲可聞不能藏其響有色可察不能滅其情以夫天地陰陽之難明猶可以術數揆而耳目可知至於人也心居於內情伏於衷非可以筭數測也凡人之心險於山川難知於天天有春夏秋冬旦暮之期人有厚貌深情不可而知之也故心有剛而色柔容強而質弱貌愿而行慢性懁而事緩假飾於外以明其情喜不必愛怒不必憎笑不必樂泣不必哀其藏情隱行未易測也日在天之外而心在人之內物亦照焉照之於外不可而偽內者也而偽猶生焉心在人之內而智又在其內神亦照焉內之於內無所取徵也而欲求其情不亦難乎不潔在面人皆恥之不潔在心人不肯愧以面露外而心伏內故善飾其情潛姦隱智終身不可得而見也少正卯在魯與孔子同時孔子門人三盈三虛唯顏淵不去獨知聖人之德也夫門人去仲尼而皈少正卯非不知仲尼之聖亦不知少正卯之佞子貢曰少正卯魯之文人也夫子為政何以先之子曰賜也非爾所及也夫少正卯心逆而儉行辟而堅言偽而辯詞鄙而慱順非而澤有此五為而亂聖人以子貢之明而不能見知人之難也以是觀之佞與賢相類詐與信相似辯與智相亂愚與直相像若薺苨之亂人參蛇床之似蘼蕪也俗之常情莫不自賢而鄙物重已而輕人觀其意也非苟欲以愚勝賢以短加長由于人心難知非可以淮衡平夫能虛已相推故有以輕抑重以短凌長是以嫫母窺井自謂媚勝西施齊桓矜德自稱賢於堯舜若子貢始事孔子一年自謂勝之二年以為同德三年方知不及以子貢之才猶不識聖人之德望風相崇奚況世人而能推勝已耶是以真偽綺錯賢愚雜糅自非明哲莫能辯也
