body:
  text: 劉子卷二北齊劉晝撰辯樂第七樂者天地之聲中和之紀人情之所不能免也人心喜則笑笑則樂樂則口欲歌之手欲鼓之足欲舞之歌之舞之容發於聲音形發於動静而入於至道音聲動静性術之變盡於此矣故人不能無樂樂則不能無形形則不能無道道則不能無亂先王惡其亂也故制雅樂以道之使其聲足樂而不淫使其音調諧而不詭使其曲繁省而廉均是以感人之善惡不使放心邪氣是先王立樂之情也五帝殊時不相沿樂三王異世不相襲禮各像勲徳應時之變故黄帝樂曰雲門象雲氣出入周人冬至舞之以祀天神顓頊曰五莖言其徳被萬物盡有根莖嚳曰六英言其徳覆羣生自有英華堯曰咸池象池水周徧周人夏至舞之以祭地祗舜曰簫韶韶紹也以其紹堯之業而能齊七政肇十有二川故周人舞之以祀四望禹曰大夏夏大也以其大堯舜之徳而能平水土故周人舞之以祭山川湯曰大濩濩䕶也湯寛仁而能救䕶生民周人舞之以享姜嫄武曰大武武王以黄鍾布牧野之陣歸以太簇無射此八樂之所以異名也先王聞五聲聞當作文五聲宫商角徴羽也播八音播被也八音金石絲竹匏土革木非茍欲愉心滿耳聽其鏗鏘而已將順天地之體成萬物之性協律吕之情律管有十二所以應十二月和隂陽之氣調八風之韻東北方條風東方明庶風東南方清明風南方景風西南方凉風西方閶闔風西北方不周風北方廣莫風通九歌之分樂有九奏九奏者九夏也王夏昭夏納入夏章夏齊夏族夏驁夏陔夏肆夏王出奏王夏兩君相見奏肆夏牲出入奏昭夏四方賓來奏納夏臣有功奏章夏夫人助祭奏齊夏族人侍養奏族夏公出奏驁夏賓醉出奏陔夏是謂九夏即周禮所謂九徳之歌也奏之圜丘則神明降用之方澤則幽祗昇擊拊球石則百獸率舞樂終九成則瑞禽翔書曰簫韶九成鳯凰來儀上能感動天地郊則天神格廟則人鬼享下則移風易俗凡民函五常之性而其剛柔緩急聲音不同繫水土之風氣故謂之風好惡取舍動静無常隨君上之情欲故謂之俗孝經云移風易俗莫善於樂此徳音之音雅樂之情盛徳之樂也明王既泯風俗凌遲雅樂殘廢而溺音競興溺淫也故夏甲作破斧之歌始為東音破斧曲名歌者曰嗚呼皆䘮命矣夫東音東方主角音也殷辛作靡靡之樂始為北聲北鄙殺伐之聲鄭衛之俗好淫故有溱洧桑中之曲溱洧二水名桑中淫荒之地鄭衛公室淫亂化被人間至於世族男女奔淫野合溱洧詩云溱與洧方渙渙兮士與女方秉蕳兮女曰觀乎士曰既且且徃觀乎桑中詩云期我乎桑中要我乎上宫送我乎淇之上矣鄭國尤甚楚越之俗好勇則有赴湯蹈火之歌楚王好勇放火燒甘泉宫令士卒救之如戰陣有功者賞無功者罰士卒以泥塗身争救死者三千餘人各咏其所好歌其所欲作之者哀聽之者泣由心之所感則形於聲聲之所感必流於心故哀樂之心感則噍殺嘽緩之聲應濮上之音作則淫泆邪放之志生昔商使師延作靡靡之樂已而自沉於濮水後師㳙過焉夜聞而冩之為晉平公皷之師曠告公曰此是濮水上樂亡國之音也後遂廢不用故延年造傾城之歌漢武思靡嫚之色靡嫚妖冶也李延年姿顔豐艶武帝嬖之任為恊律都尉帝令造新聲延年侍上起舞而歌曰南國有佳人美者顔如玉一顧傾人城再顧傾人國不惜傾城國佳人不再得上嘆息曰善世豈有此人乎平陽主因言延年有女弟上迺召見之實淑麗善舞納為夫人生昌邑王時人語曰一雌一雄雙飛入紫宫中雍門作松栢之聲齊湣願未寒之服雍門樂人也為齊王彈秋風入松栢曲音極慘悽王寒思著纊荆軻入秦宋意擊筑歌於易水之上軻為太子丹報讐去至易水太子送之宋意為擊筑軻拔劒起舞歌曰風瀟瀟兮易水寒壯士一去兮不復還其精誠感天白虹貫日後刺秦王悮中銅柱身死於秦宫聞者瞋目髪直穿冠趙王遷於房陵心懐故鄉作山木之謳坐唱曰謡行唱曰謳曰山有木兮木有枝心思君兮君豈知聽者嗚咽泣涕流連此皆淫泆悽愴憤厲哀思之聲非理性和情徳音之樂也桓帝聽楚琴慷慨歎息悲酸傷心即楚姬怨也曰善哉為琴若此豈非樂乎夫樂者聲樂而心和所以名為樂也今則聲哀而心悲灑淚而歔欷是以悲為樂也若以悲為樂亦何樂之有哉今悲思之聲施於管絃聽音者不淫則悲淫則亂男女之辯悲則感怨思之聲豈所謂樂哉故奸聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉樂不和順則氣有蓄滯氣有蓄滯則有悖逆詐偽之心淫泆妄作之事是以奸聲亂色不留聰明淫樂慝禮不接心術使人心和而不亂者雅樂之情也故為詩頌以宣其志鐘鼓以節其耳羽旄以制其目聽之者不傾視之者不邪耳目不傾不邪則邪音不入邪音不入則情性内和情性内和然後乃為樂也履信第八信者行之基行者人之本人非行無以成行非信無以立故信之行於人譬濟之須舟也信之於行猶舟之待檝也將涉大川非舟何以濟之欲泛方舟非檝何以行之今人雖欲為善而不知立行猶無舟而濟川也雖欲立行而不知立信猶無檝而行舟也是適郢土而首冥山郢土在南冥山在北背道愈逺矣自古皆有死人非信不立故䐁魚著信之所及也允哉斯言非信不成齊桓不背曹劌之盟齊桓與魯莊㑹于柯曹劌手劒從之管仲曰君將何求曹子曰願請汶陽之田仲顧公曰君許諾公曰諾曹子請盟公下與之盟曹子標劍而去桓公亦不怒信著天下自柯之盟始焉晉文不棄伐原之誓文公伐原令士卒齋三日粮粮盡即還至圓原城三日不降文公令還吏曰原不過三日將降矣不如待之公曰已約得城失信吾不為也原人聞之請命自降諸侯由此多歸附吴起不虧移轅之賞起欲伐秦恐士卒不信乃埋車轅於市東門書曰有能移着西門者給田百畝黄金百斤三日無敢移更書曰能移者給田五百畝黄金五百斤時一人來移即賜之田五百畝金五百斤於是士卒勇於攻戰伐秦遂克魏侯不乖虞人之期虞人掌山澤之官也文發侯與虞人期獵明日欲遇大雨左右諫止之文侯曰吾志不急於獸禽也吾固已與虞人期恐失信遂冒雨以進用能徳光於宇宙名流於古今不朽者也故春之得風風不信則花蕚不茂花蕚不茂則發生之徳廢夏之得炎炎不信則草木不長草木不長則長贏之徳廢秋之得雨雨不信則百榖不實百榖不實則收成之徳廢冬之得寒寒不信則水土不堅水土不堅則安静之徳廢以天地之靈氣不信四時猶廢而况於人乎昔齊攻魯求其岑鼎魯侯偽獻他鼎而請盟焉齊侯不信使栁季云是栁季魯之信人則請受之魯使栁季栁季曰君以鼎為國信者亦臣之國今欲破臣之國全君之國臣所難也乃獻岑鼎小邾射以邑奔魯曰魯使季路要我我無盟矣乃使子路辭焉季孫謂之曰千乘之國不信其盟而信子之一言子何辱焉子路曰彼不臣而濟其言是不義也由不能矣夫栁季季路魯之匹夫立信於衡門而聲馳於天下故齊邾不信千乘之盟而重二子之言信之為徳豈不大哉秦孝公使商鞅攻魏魏遣公子昻逆而拒之鞅謂昻曰昔鞅與公子善今俱為兩國將不忍攻願一飲燕休二師公子許焉遂與之㑹鞅伏甲虜之擊破魏軍及惠王即位疑其行詐遂車裂於市夫商鞅秦之貴臣名重於海内貪詐偽之小功失誠信之大義一言不信終身為尤卒至屠滅為天下笑無信之弊豈不重乎故言必如言信之符也同言而信信在言前同教而行誠在言外君子知誠信之為貴必忱信而行指麾動静不失其符以施教則立以蒞事則正以懐逺則附以賞罰則明由此而言信之為行其徳大矣思順第九七緯順度以光天象天象五星如連珠日月似合璧五性順理以成人行行象為美美於順也天人為失失在于逆故七緯逆則天象變五性逆則人道敗變而不生災敗而不傷行者未之有也山海争水水必歸海非海求之其勢順也蹇利西南坎上艮下為蹇就土順也不利東北登山逆也是以去濕就燥火之勢也違髙從下水之性也今導泉向澗則為易下之流激波陸山必成難昇之勢水之無情猶知違逆趣順矧人心乎故忠孝仁義徳之順也悖傲無禮徳之逆也順者福之門逆者禍之府由是觀之逆性之難順性之易斷可識矣今使孟說引牛之尾孟說紂時勇士尾斷臏裂不行十步若環桑之條以貫其鼻縻以尋綯被髪童子騎而䇿之風于廣澤恣情所趨何者十步之行非逺於廣澤被髪之童非勇於孟説然而近不及逺强不如弱者逆之與順也司馬蒯瞶天下之攻劍者也令提劍鋒而掉劍觚必刎其指而不能以䧟腐木而况金甲乎若提其觚而掉其鋒雖則凡夫可以陸斬犀象水截蛟龍矣順理而行若執劍觚逆情而動如執劍鋒能無傷乎后稷善播植不能使禾稼冬生逆天時也禹善治水鑿九川不能迴水西流逆地勢也人雖才藝卓絶不能悖理成行逆人道也故循理處情雖愚憃可以立名反道為務雖賢哲猶有禍害君子如能忠孝仁義履信思順自天祐之吉無不利也慎獨第十善者行之總不可斯湏離可離非善也人之湏善猶首之湏冠足之待履首不加冠是越類也行不躡履是夷民也今處顯而脩善在隱而為非是清旦冠履而昏夜倮跣也荃蓀孤植不以巖隱而歇其芳石泉潛流不以澗幽而不清人在暗密豈以隱翳而迴操是以戒慎目所不覩恐懼耳所不聞居室如見賓入虚如有人故蘧瑗不以昏行變節衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此為誰曰蘧伯玉也顔回不以夜浴改容勾踐拘於石室君臣之禮不替越王范蠡吳王囚之登髙望之顧謂太宰嚭曰彼越王一節之人范蠡一介之士雖在窮厄之地而不失君臣之禮冀缺耕於坰野夫婦之敬不虧冀邑名郤其姓也林外曰坰郊外曰野缺耕于田其妻饁之敬相待如賓斯皆慎乎隱㣲枕善而居不以視之不見而移其心聽之不聞而變其情也謂天葢髙而聽甚卑謂日葢逺而照甚近謂神葢幽而察甚明詩云相在爾室尚不媿於屋漏西北隅謂屋漏無曰不顯莫予云覯暗昧之事未有幽而不顯昏惑之行無有隱而不彰脩操於明行悖於幽以人不知若人不知則鬼神知之鬼神不知則己知之而云不知是盜鐘掩耳之智也孔徒晨起為善孜孜東平居室以善為樂漢明帝遣使手詔賜東平國中傅曰日者問王蒼處家何等最樂王言為善最樂其言甚大非諸侯王驕恣放逸者可比故身恒居善則内無憂慮外無畏懼獨立不慚影獨寢不愧衾上可以接神明下可以固人倫徳被幽明慶祥臻矣貴農第十一衣食者民之本也民者國之本也民恃衣食猶魚之湏水國之恃民如人之倚足魚無水則不可以生人失足必不可以步國失民亦不可以治先王知其如此而給民衣食故農祥旦正辰集娵訾陽氣憤盈上耕帝藉於東郊倉庚鳴戴勝降后妃躬桑於北郊用己未日國非無良農也而王者親耕世非無蠶妾也而后妃躬桑上可以供宗廟下可以勸兆民神農之法曰丈夫丁壯而不耕天下有受其饑者婦人當年而不織天下有受其寒者故天子親耕后妃親織以為天下先是以其耕不强者無以養其生其織不力者無以葢其形衣食饒足奸邪不生安樂無事天下和平智者無所施其䇿勇者無以行其威故衣食為民之本而工巧為其末也是以雕文刻鏤傷於農事錦繢綦組害於女工農事傷則饑之本也女工害則寒之源也饑寒並至而欲禁人為盜是揚火而欲無炎撓水而望其静不可得也衣食足知榮辱倉廩實知禮節故建國者必務田蠶之實棄美麗之華以榖帛為珍寳比珠玉於糞土何者珠玉止於虚玩而榖帛有實用也假使天下瓦礫悉化為和璞砂石皆變為隋珠如值水旱之嵗瓊粒之年則璧不可以禦寒珠未可以充饑也雖有奪日之鑑代月之光歸於無用也何異畫為西施美而不可悦刻作桃李似而不可食也衣之與食惟生人之所由其最急者食為本也霜雪巖巖苫蓋不可以代裘苫茆也言無布帛可衣惟衣茆蒙象女人之衣故曰蒙今江東亦呼苑為蓋也室如懸磬草木不可以當粮故先王制國有九年之儲可以備非常救灾厄也堯湯之時有十年之蓄及遭九年洪水七載大旱不聞饑饉相望捐棄溝壑者蓄積多故也榖之所以不積者在於游食者多而農人少故也夫螟螣秋生而秋死食苖心曰螟食節曰螣食根曰蝥食葉曰蠈此四蟲者皆為人害也一時為灾而數年乏食今一人耕而百人食之其為螟螣亦以甚矣是以先王敬授民時勸課農桑省游食之人減徭役之費則倉廩充實頌聲作矣公羊髙曰什一天下之中正也什一行而頌聲作矣雖有戎馬之興水旱之沴國未嘗有憂民終為無害也劉子卷二
