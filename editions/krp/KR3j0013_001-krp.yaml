front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0013_WYG_001-1a, image: WYG0848/WYG0848-0883a.png}
body:
  text: 劉子卷一北齊劉晝撰清神第一形者生之器也心者形之主也神者心之寳也故神静而心和心和而形全神躁則心蕩心蕩則形傷将全其形先在理神故恬和養神則自安於内清虚棲心則不誘於外神恬心清則形無累矣虚室生白吉祥至矣人不照於鑠金而照於瑩鏡者以瑩能明也不鑑於流波而鑑於静水者以静能清也鏡水以明清之性故能形物之形由此觀之神照則垢滅形静則神清垢滅則内慾永盡神清則外累不入今清歌奏而心樂悲聲發而心哀神居體而遇感推移以此而言之則情之變動自外至也夫一哀一樂猶搴正性况萬物之衆而能拔擢以清心神哉故萬人彎弧以向一鵠鵠能無中乎萬物眩曜以惑一生生能無傷乎七竅者精神之户牖也志氣者五臓之使候也耳目之於聲色鼻口之於芳味肌體之於安適其情一也七竅紛於視聽則精神馳騖而不守志氣縻於趣捨則五臓滔蕩而不安嗜慾連綿於外心腑壅塞於内蔓衍於荒淫之波留連於是非之境而不敗徳傷生者盖亦寡矣是以聖人清目而不視静耳而不聽閉口而不言棄心而不慮貴身而忘賤故尊勢不能動樂道而忘貧故厚利不能傾容身而處適情而游一氣浩然純白於衷故形不養而性自全心不勞而道自至也防慾第二人之稟氣必有性情性之所感者情也情之所安者慾也情出於性而情違性慾由於情而慾害情情之傷性性之妨情猶煙氷之與水火也煙生於火而煙鬱火氷出於水而氷遏水故煙㣲而火盛氷泮而水通性貞則情銷情熾則性滅是以珠瑩則塵埃不能附性明則情慾不能染也故林之性静所以動者風揺之也水之性清所以濁者土渾之也人之性貞所以邪者慾眩之也身之有慾如樹之有蝎樹抱蝎則還自鑿身抱慾而返自害故蝎盛則木拆慾熾則身亡将収情慾先歛五闗五闗者情慾之路嗜好之府也目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼓口貪滋味命曰燻喉之煙身安轝駟命曰召蹷之機此五者所以養生亦以傷生耳目之於聲色鼻口之於芳味肌體之於安適其情一也然亦以之死亦以之生或為賢智或為庸愚由於處之異也譬由愚者之養魚鳥也見天之寒則納魚於温湯之中而棲鳥於火林之上水木者所以養魚鳥也養之失理必至燋爛聲色芳味所以悦人悦之過理還以害生故明者刳情以遣累約慾以守貞食足以充虚接氣衣足以盖形禦寒靡麗之華不以滑性哀樂之感不以亂神處於止足之泉立於無害之岸此全性之道也夫蜂蠆螫指則窮日煩擾蚊蟲噆膚則通宵失寐蚊蜂小害指膚外疾人入山則避蜂蠆入室則驅蚊䖟何者以其害於體也嗜慾攻心正性顛倒嗜慾大害攻心内疾方於指膚亦以多也外疾之害輕於秋毫人知避之内疾之害重於泰山而莫之避是棄輕患而負重害不亦倒乎人有牛馬放逸不歸必知収之情慾放逸而不知収之不亦惑乎將收情慾必在危㣲情慾之萌如木之將蘖火之始熒手可掣而斷露可滴而滅及其熾也結條凌雲煽熛章華雖窮力運斤竭池灌火而不能禁其勢盛也嗜慾之萌耳目可闗而心意可鑰至於熾也雖襞情卷慾而不能収其性敗也如能塞情於未形禁慾於危㣲雖求悔吝其可得乎去情第三情者是非之主而利害之根有是必有非能利亦能害是非利害存於衷而彼此還相疑故無情以接物在遇而恒通有情以接人觸應而成礙由此觀之則情之所處物之所疑也是以謀揚譽人而受譽者不以為徳市夫强飯而蒙飽者不以為惠嬰兒傷人而被傷者不以為怨侏儒嘲人而獲嘲者不以為辱何者挾利以為己有情於譽飽雖䝉惠而非徳無情於傷辱雖獲毁而無憾魚不畏網而畏鵜復讐者不怨鏌鎁而怨其人網無心而鳥有情劒無情而人有心也使信士分財不如投䇿探鈎使亷士守藏不如閉局全封何者有心之於平不若無心之不平也有慾之於亷不若無慾之不亷也今人目若驪珠心如權衡評人好醜雖言得其實彼必嫌怨及其自照明鏡摹刻其容醜狀既露則内慙而不怨向之評者與鏡無殊然而向怨而今慙者以鏡無情而人有心也三人居室二人交争必取信於不争者以辨彼此之得失夫不争者未必平而交争者未必偏而信於不争者何也以争者之心並挾勝情故也飄瓦擊人無心觸巳是以聖人棄智以全真遣情以接物不為名尸不為謀府混然無際而俗莫能累矣韜光第四物之寓世未嘗不韜形滅影隱質遐外以全性棲命者也夫含奇佩美衒異露才者未有不以此傷性毁命者也故翠以羽自殘龜以智自害丹以含色磨肌石以抱玉碎質此四者生於異俗與人非不隔也託性於山林寄情於物外非有求於人也然而自貽伊患者未能隱其形也若使翠歛翮於明丘之林則解羽之患永脱龜曳尾於暘谷之泥則鑽灼之患不至丹伏光於舂山之底則磨肌之患永絶石亢體於𤣥圃之嵒則剖琢之憂不及故窮巖曲岫之梓櫟生於積石穎貫青天根鑿黄泉分條布葉輪菌磥硊騏驎戲其下鵷鸞游其顛浮雲棲其側清風激其間終嵗無毫釐之憂免刀斧之害者非與人有徳也能韜隱其質故致全性也路側之榆樵人採其條匠者伐其柯餘有尺蘖而為行人所折者非與人有讐也然而致冦者形不隱也周鷄斷尾獲免犧牲文王欲殺雄鷄祭廟其鷄知毛色中度乃自齕其尾恐神明不歆遂免死山狙見巧終必招害山狙靈獸善能拍箭楚王出獵山狙繞樹見巧王問左右曰誰能善射對曰惟養由基王令射之由基調炫捻箭狙抱樹而啼知其神射必見死也由此言之則出處之理亦可知矣是以古之有徳者韜迹隱智以密其外澄心封情以定其内内定則神腑不亂外密則形骸不擾以此處身不亦全乎崇學第五至道無言非立言無以明其理大象無形非立象無以測其奥道象之妙非言不傳傳言之妙非學不精未有不因學而鑒道不假學以光身者也夫蠒繰以為絲織為縑紈繢以黼黻則王侯服之人學為禮儀雕以文藻而世人榮之蠒之不繰則素絲蠧於筐籠人之不學則才智腐於心胷海蚌未剖則明珠不顯崑竹未斷則鳳音不彰性情未鍊則神明不發譬諸金木金性苞水木性藏火故鍊金則水出鑽木而火生人能務學鑽鍊其性則才慧發矣青出於藍而青於藍染使然也氷生於水而冷於水寒使然也鏡出於金而明於金瑩使然也戎夷之子生而同聲長而異語教使然也山抱玉而草木潤焉川貯珠而岸不枯焉口納滋味而百節肥焉心受典誥而五性通焉故不登峻岑不知天之髙不瞰深谷不知地之厚不游六藝不知智之深逺而光華者節也近而愈明者學也故呉簳質勁非筈羽而不美越劔性利非淬礪而不銛人性懁慧非積學而不成㳂淺以及深披闇而覩明不可以傳聞稱非得以汎濫善也夫還鄉者心務見家不可以一步至也慕學者情纒典素不可以一讀能也故為山者基於一簣之土以成千丈之峭鑿井者起於三寸之坎以就萬仞之深靈珠如豆不見其長疊嵗而大鐃舌如指不覺其損累時而折懸巖滴溜終能穿石規車牽索卒至斷軸水非石之鑽繩非木之鋸然而斷穿者積漸之所成也耳形完而聽不聞者聾也目形全而視不見者盲也人性美而不監道者不學也耳之初窒目之始昧必不恡百金逆醫千里人不涉學猶心之聾盲不知逺祈明師以攻心術性之蔽也故宣尼臨沒手不釋卷仲舒垂卒口不輟誦廣川人下帷講誦三年不窺園有子惡卧自焠其掌蘇生患睡親錐其股洛陽人讀書欲睡以錐刺其股流血至踝以聖賢之性猶好學無倦矧庸人而可怠哉専學第六學者出於心心為身之主耳目候於心若心不在學則聽誦不聞視簡不見如欲鍊業必先正心而後理義入焉夫兩葉掩目則㝠黙無覩雙珠填耳必寂寞無聞葉作目蔽珠為耳鯁二闗外擁視聽内隔故其宜也而離婁察秋毫之末不聞雷霆之聲季子聽清角之韻不見嵩岱之形視不闗耳而耳不見聽不闗目而目不聞者何也心溺秋毫意入清角故也是以心駐於目必忘其耳則聽不聞心駐於耳必遺其目則視不見也使左手畫方右手畫圓令一時俱成雖執規矩之心迴剟劂之手剟方刀劂圓刀而不能者由心不兩用則手不並運也奕秋通國之善奕也當奕之思有吹笙過者傾心聽之將圍未圍之際問以奕道則不知也非奕道暴深情有蹔闇笙猾之也𨽻首天下之善算也當算之時有鳴鴻過者彎弧擬之將發未發之間問以三五則不知也非三五難算意有暴昧鴻亂之也奕秋之奕𨽻首之算窮㣲盡數非有差也然而心在笙鴻而奕敗算撓者是心不専一游情外務也瞽無目而耳不可以察専於聽也聾無耳而目不可以聞専於視也以瞽聾之㣲而聽察聰明審者用心一也夫蟬難取而黏之如掇掇急也仲尼適楚見傴僂者捕蟬黏之如掇曰巧哉巧哉卷耳易採而不盈傾筐枲耳葉如䑕耳叢生如盤可煮為茹即今蒼耳詩云采采卷耳不盈傾筐嗟我懐人寘彼周行是故學者必精勤専心以入於神若心不在學而强諷誦雖入於耳而不諦於心譬若聾者之歌效人為之無以自樂雖出於口則越散矣劉子卷一
