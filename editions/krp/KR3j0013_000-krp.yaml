body:
  text: 劉子雜家類一雜學之屬提要臣等謹案劉子十卷隋志不著録唐志作梁劉勰撰陳振孫書録解題晁公武讀書志俱據唐播州録事參軍袁孝政序作北齊劉晝撰宋史藝文志亦作劉晝自明以來刋本不載孝政註亦不載其序惟陳氏載其序畧曰晝傷已不遇天下陵遲播遷江表故作此書時人莫知謂為劉勰劉歆劉孝標作云云不知所據何書故陳氏以為終不知晝為何代人按梁通事舍人劉勰史惟稱其撰文心雕龍五十篇不云更有别書且文心雕龍樂府篇稱塗山歌於候人始為南音有娀謡乎飛燕始為北聲夏甲歎於東陽東音以發殷整思于西河西音以興此書辨樂篇稱夏甲作破斧之歌始為東音與勰説合其稱殷辛作靡靡之樂始為北音則與勰説逈異必不出于一人又史稱勰長於佛理嘗定東林寺經蔵後出家改名慧地此書末篇乃歸心道教與勰志趣逈殊白雲霽道蔵目録亦收之太元部無字號中其非奉佛者明甚近本仍刋劉勰殊為失考至劉孝標之説南史梁書俱無明文未足為據劉歆之説則激通篇稱班超憤而習武卒建西域之績其説可不攻而破矣惟北齊劉晝字孔昭渤海阜城人名見北史儒林傳然未嘗播遷江表與孝政之序不符傳稱晝孤貧愛學恣意披覽晝夜不息舉秀才不第乃恨不學屬文方復綴緝詞藻言甚古拙與此書之縟麗輕蒨亦不合又稱求秀才十年不得乃發憤撰髙才不遇傳孝昭時出詣晉陽上書言亦切直而多非世要終不見收乃編録所上之書為帝道河清中又著金箱璧言以指機政之不良亦不云有此書豈孝政所指又别一劉晝歟觀其書末九流一篇所指得失皆與隋書經籍志子部所論相同使隋志襲用其説不應反不録其書使其剽襲隋志則貞觀以後人作矣或袁孝政採掇諸子之言自為此書而自注之又恍惚其著書之人使後世莫究詰亦未可知也然劉勰之名今既確知其非自當刋正劉晝之名則介在疑似之間難以確斷姑仍晁氏陳氏二家之目題晝之名而附著牴牾如右乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
