body:
  text: 劉子卷七北齊劉書撰誡盈第三十四四時之序節滿即謝五行之性功成必退故陽極而降隂極而昇日中則昃月盈則虧此天之常道也勢積則損財聚則散年盛返衰樂極還悲此人之恒情也昔仲尼觀欹器而革容孔子觀於魯桓公廟有欹器焉問守者曰此何器曰正坐之器曰吾聞虚則欹中則正滿則覆明君以為至誡故常置於坐側顧謂弟子曰試注水焉乃注之水中則正滿則覆夫子喟然歎曰嗚呼夫物惡有滿而不覆者哉鑒損益而歎息孔子讀易至於損益喟然而嘆子夏問曰夫子何歎焉孔子曰夫自損者必有益自益者必有損喜之以是歎也此察象而識類覩霜而知氷也夫知進而不知退則踐盈滿之危處存而不忘危必履太山之安故雷在天上曰大壯山在地中曰謙謙則裒多益寡壯則非禮勿履處壯而能用禮居謙而能益寡降髙以就卑抑强而同弱未有謙尊而不光驕盈而不斃者也聖人知盛滿之難持每居徳而謙冲雖聰明睿智而志逾下富貴廣大而心逾降勛盖天下而情逾抑不以徳厚而矜物不以身尊而驕民故楚莊王功立而心懼晉文公戰勝而色憂非憎榮而惡勝乃功大而心小居安而念危也夏禹一饋而七起周公一沐而三握髪食不遑飽沐不及晞非耐饑而樂勞是能心急於接士處於謙光也易曰以貴下賤大得民也是以君子髙而能卑富而能儉貴而能賤智而能愚勇而能怯辯而能訥博而能淺明而能闇是謂損而不窮也明謙第三十五天道下濟而光明江湖善下而為王故山在地中成謙王侯以孤寡為損謙則榮而逾髙損則顯而彌貴髙必以下為基貴則以賤為本在貴而忘貴故能以貴下民處髙而遺髙故能以髙就卑是以大壯徃則復天地之謙也極昇必降隂陽之謙也滿終則虧日月之謙也道盈體冲聖人之謙也易稱謙尊而彌光老子云不伐故有功謙者在於降已以髙下卑以聖從鄙不伐在於有功不矜在於有徳不言歸於冲退謙挹之流也好盈自賢矜功伐善者俗之恒情聖人之惡也必矜其功雖賞之而稱勞情猶不足茍伐其善雖與之賞多必怨其少則慊望之情生躁競之色見矜伐之路開患難之釁作矣君子則不然在榮以挹損為基有功而不矜有善而不伐遺其功而功常存忘其善而善自全情恒忘善故能以善下物情恒存善故能以善勝人是以情存功善非心謙也口虚託謙豈非矯乎以善勝物心遺功善非矜伐也口及其善豈非實乎故心存功善非心謙也口雖不言未免矜伐心捨功善口雖明言無傷於亷故夏禹昌言明稱伐功咎繇陳謨云説我惠豈其矜功而存惠哉夫言善非伐而伐善者毎稱其能言惠非矜而矜惠者常存其惠聖人知人情尚賢而好伐故發言裁典多由謙退所以棄其驕誇競垂世則也大質第三十六火之性也大寒慘悽凝冰裂地而炎氣不為之衰大熱煊赫焦金爍石而炎氣不為之熾者何也有自然之質而寒暑不能移也故丹可磨而不可奪其色蘭可燔而不可滅其馨玉可碎而不可改其白金可銷而不可易其剛各抱自然之性非可强變者也士有忠義之性懐正直之操不移之質亦如兹者也是以生茍背道不以為利死必合義不足為害故不趨利而逃害不忻生而憾死不可以威脅而變其操不可以利誘而易其心昔子閭之劫也擬之白刄而其心不傾楚白公勝作亂殺子西劫子閭謂曰從我則免否即殺之以白刄刺閭心閭竟不從也晏嬰之盟也鈎以曲㦸而其志不迴崔杼弑齊君使人將鐵鈎鈎嬰項欲與立盟共為要誓嬰終不與不可以利害變其情矣夫士有忠義之行踐繩墨之節其於平日乃無異於衆人及至處患蹈難而志氣貞剛然後知其殊也譬如鍾山之玉鍾山在會稽也寒嶺之松此瓀珉梓栁無殊也瓀珉似玉入火即銷梓是楸栁是楊栁也及其燒以爐炭三日而色潤不改處於積冰終嵗而枝葉不凋然後知其異於他玉衆木也故袒裼暴虎而後勇氣發焉超騰絶坂而後迅捷露焉手提萬鈞而後多力見焉處難踐患而後真勇出焉不用干將奚以知其鋭也不引烏號奚以知其勁也烏號弓以蘭桑木為之黄帝殿前有桑一枝烏嘗飛其上嗚咽帝見之曰此木應堪材用也遂取為弓極美故曰烏號弓説文云黄帝於鼎湖山上得仙去遺弓羣臣見之皆泣又云南嶺山有枯木烏每棲其上鳴因名烏號弓也勁鋭之質較然易見猶因人獲顯况乃志行難覩曷得不因事而後明虖辯施第三十七夫山臯非為鳥植林林茂而鳥自栖之江湖非為魚鑿潭潭深而魚自歸之處世非為人積財財積而人自依之非其所招勢使然也懐璧之子未必能惠而人競親者有惠人之資也被褐之士性能輕財而皆疎之者無惠人之資也令富而儉吝猶見親敬貧而仁施必見疎慢非行之失彼情變也䇿駟登山不得直轡而行泛舟入海不得安身而坐何者山路迂迴海水淪没行者欲直而路曲之坐者欲安而水蕩之仁者欲施而貧遏之富而賑物徳不為難貧而儉嗇行非為過天之道損有餘人之情矜不足也崑山之下以玉抵烏彭蠡之濱以魚食犬而人不愛者非性輕財所豐故也挈缾丐水執萑求火草似龍鬚可為席人用烳火也音普而人不恡非性好施有餘故也口非匏𤓰不得不食身非木石不得不衣食不滿腹豈得輟口而惠人衣不蔽形何得露體而施物非性儉恡不足故也饑饉之春不賑朋戚多稔之秋饗及四隣不賑朋戚人之惡惠及四隣人之善盖善惡之行出於性情而繫于饑穰也以此觀之太豐則恩情生窶乏則仁惠廢也窶貧相馬者失在於瘦求千里之步虧也相人者失在於貧求恩惠之迹缺也輕財之士世非少也然而不見者貧掩之也徳行未著而稱我能猶足不能行而賣躄藥望人信之實為難矣和性第三十八夫歐冶鑄劔越王時人姓聶名干將善能歐冶鑄劔太剛則折太柔則卷欲劔無折必加其錫欲劔無卷必加其金何者金性剛而錫質柔剛柔均平則為善矣良工塗漆緩則難晞漆急則弗牢均其緩急使之調和則為美也人之含性有似於兹剛者傷於嚴猛柔者失於軟懦緩者悔於後機會也急者敗於懁促懁急懁古縣反故鑄劍者使金不至折錫不及卷製器者使緩而能晞急而能牢理性者使剛而不猛柔而不懦緩而不後機急而不懁促故能劍器兼善而性氣淳和也昔徐偃王軟而國滅周穆王西巡狩聞徐子僭號命楚伐徐徐子愛民無權不忍鬭北走彭城將死曰吾賴於文徳而不明武備故至此齊簡公懦而身亡此性太柔之失也晉陽處父以純剛取害晉大夫性太剛躁後被晉君所殺鄭子陽以嚴猛致斃鄭君性太嚴猛後為臣下所殺此性太剛之過也楚子西寛而招敗邾莊公懁而自禍此性褊急之災也西門豹性急佩韋皮以自緩六國時為鄴令董安于性緩帶絲絃以自急晉陽太守彼各能以一物所長攻其所短故隂陽調天地和剛柔均人事和也隂陽不和則水旱失節剛柔不均則强懦乖政水旱失節則嵗敗强弱乖政則身亡是以智者寛而栗嚴而温柔而毅猛而仁剛而濟其柔柔抑其强强弱相㕘緩急相弼以斯善性未聞誤物而有悔恡者也殊好第三十九累榭洞房珠簾玉扆人之所悦也鳥入而憂聳石巉巖輪菌糺結猨狖之所便也人生而慄五莖六英咸池簫韶人之所樂也獸聞而振懸瀨碧潭瀾波洶湧魚龍之所安也人入而畏飛鼯甘煙飛鼯好食火煙走貃美鐵獸好食鐵䲰日嗜虵鳥似鷄高三尺亦曰䲰鷄人好芻豢食草曰芻食米曰豢鳥獸與人受性既殊形質亦異所居隔絶嗜好不同未足怪也人之與獸共稟二儀之氣俱抱五常之性雖賢愚異情善惡殊行至於目見日月耳聞雷霆近火覺熱履水知寒此之麤識未宜有殊也聲色芳味各有正性善惡之分皎然自露不可以皂為白以羽為角以苦為甘以臭為香然而嗜好有殊絶者則偏其反矣非可以類推弗得以情測顛倒好醜良可怪也頳顔玉理眄視巧笑衆目之所悦也軒皇愛􅙵母之魌貌魌醜貌也不易落英之麗容陳侯悦敦洽之醜狀弗賞陽文之婉姿炮羔煎鴻臛􅏲臑熊􅏲是龜臑是蹯即熊掌也煮熟以密淹之可食衆口之所嗛以其味美故也文王嗜菖蒲之葅不易龍肝之味陽春白雪激楚採菱皆是曲名衆耳之所樂也而漢順聴山鳥之音云勝絲竹之響魏文侯好搥鑿之聲不貴金石之和鬱金𤣥憺恬静薫香春蘭秋蕙盡是香草衆鼻之所芳也海人悦至臭之夫不愛芬馨之氣若斯人者皆性有所偏也執其所好而與衆相反則倒白為黒變苦成甘移角成羽佩蕕蒜當薫美醜無定形愛憎無正分也劉子卷七
