body:
  text: 劉子卷十北齊劉晝撰正賞第五十一賞者所以辯情也評者所以繩理也賞而不正則情亂於實評而不均則理失其真理之失也由於貴古而賤今情之亂也在乎信耳而弃目古今雖殊其迹實同耳目誠異其識則齊識齊而賞異不可以稱正迹同而評殊未得以言平評正而賞反則情理並亂也猶今人之畫鬼魅者易為巧摹犬馬者難為工何者鬼魅質虚而犬馬質露也質虚者可託怪以示奇形露者不可誣罔以是非難以其真而見妙也託怪於無象可假非而為是取範於真形則雖是而疑非昔魯哀公遙慕稷契之賢不覺孔丘之聖齊景公髙睎管仲之謀不知晏嬰之智張伯松逺羨仲舒之博近遺子雲之美以夫子之聖非不光於稷契晏嬰之賢非有減於管仲楊子雲之才非不亞於董仲舒然而弗貴者豈非重古而輕今珍逺而鄙近貴耳而賤目崇名而毁實耶觀俗之論非茍欲以貴彼而賤此飾名而挫實由於美惡混揉真偽難分置法而不以度物信心而定是非也今以心察錙銖之重則莫之能識懸之權衡則毫釐之重辯矣是以聖人知是非難明輕重難定制為法則揆量物情故權衡誠懸不可欺以輕重繩墨誠陳不可誣以曲直規矩誠設不可罔以方圓故摹法以測物則真偽易辯矣信心而度理則是非難明矣越人臛虵以饗秦客甘之以為鯉也既而知其是虵攫喉而嘔之此為未知味也趙人有善曲者託以伯牙之聲世人競習之後聞其非乃束指而罷此為未知音也宋人得石燕以為美玉銅匣而藏之後知是石因捧匣而弃之此為未識玉也郢人為賦託以靈均即屈原也舉世而誦之後知其非皆緘口而捐之此為未知文也故以虵為鯉者惟易牙不失其味以趙曲為雅聲者惟鍾期不溷其音以燕石為美玉者惟猗頓不謬其真以郢賦為麗藻者惟相如不濫其賞昔二人評玉一人曰好一人曰醜久不能辯客曰爾來入吾目中則好醜分矣夫玉有定形而察之不同非好相反瞳睛殊也垂珠黼幌綴以金碧流光若霞耀爛眩目而醉者眸轉呼為熖火非黼幌狀移目改變也鏡形如杯以照西施鏡縱則靣長鏡横則靣廣非西施貌易所照變也海濱居者望島如舟望舟如鳬而須舟者不造島射鳬者不向舟知是望逺目亂心惑也山底行者望嶺樹如簪視岫虎如犬而求簪者不上亡犬者不徃呼知是望髙目亂而心惑也至於觀人論文則以大為小以能為鄙而不知其目亂心惑也與望山海不亦反乎昔者仲尼先飯黍侍者掩口笑子游裼裘而弔曽參揮指而哂以聖賢之舉錯非有謬也而不免於嗤誚奚况世人未有名稱其容止文華能免於嗤誚者豈不難也以此觀之則正可以為邪美可以稱惡名實顛倒可謂歎息也今述理者本之知音君子聰達亮於聞前明鑒出於意表不以名實眩惑不為古今易情採其制意之本畧其文外之華不沒纎芥之善不掩螢爝之光可謂千載一遇也激通第五十二登峭嶺者則欲望逺臨峻谷者必欲窺墟墟墓之間使情哀清廟之中使心敬此處無心而情為之發者地勢使之然也故駛雪多積荒城之隈急風好起沙河之上克己類出甕牖之氓決命必在吞氣之士何者寒荒之地風雪之所積慷慨之懐忠義之所聚是以楩柟鬱蹙以成縟錦之瘤蚌蛤結疴而銜明月之珠鳥激則能翔青雲之際矢驚則能踰白雪之嶺秦穆公使人造弓三年乃成及用不能穿一札欲殺弓工工有女見公曰此柘生在朝陽之地妾見父粘以春膠披以麋筋束之箭簳三年而始成公今用射不穿一札是父合當死妾聞射法左手如植枝右手如格虎右手發左手不知公自不知射何欲殺妾父穆公乃取弓當虎圍而射之矢踰於山過彭城之東斯皆仍瘁以成明文之珍因激以致髙逺之勢衝飈之激則折木湍波之涌必漂石風之體虚水之性弱而能披堅木轉重石者激勢之所成也故居不隱者思不逺也身不危者其志不廣也蘇秦若有負郭之田必不佩六國之印秦見昆弟前倨後恭喟然歎曰一人之富貴則親戚畏懼之貧賤則輕易之且使我有洛陽負郭田二頃吾豈能佩六國相印乎主父不為親友所蔑必不窺五鼎之食偃家貧游齊為親友排擯後為齊相遂列九鼎奏鍾而食張儀不有堂下之恥必無入秦之志儀遊説不遇徃趙謁蘇秦秦見之堂下賜僕妾之食儀怒入秦為客卿范雎若無厠中之辱不懐復魏之心雎從須賈使齊齊賜金酒魏齊以為私告國事溺雎厠中及為秦相賈膝行謝罪雎歎曰為我告魏王急持魏齊頭來不然我且屠大梁甯越激而修文卒為周威之師越好學家貧為人傭作人息不息人寢不寢威王賢之聘為師班超憤而習武終建西域之績超家貧常為官傭書以供養輟投筆歎曰大丈夫當立功西域以取封侯安能久事筆硯間乎竟征西域封定逺侯觀其數賢皆因窘而發志縁阨而顯名故平原五達易行之衢也孤峯九折難陟之逕也從髙趣下駑馬之步也騰峭登危飛鼯之足也以險而陟然後為貴以難而昇所以為賢古之烈士厄而能通屈而能伸彼皆有才智又遇其時得為世用也惜時第五十三夫停燈於缸先熖非後熖而明者不能見藏山於澤今形非昨形而智者不能知何者火則時時滅山亦時時移夫天迴日轉其謝如矢騕褭迅足神馬弗能追也人之短生猶如石火炯然以過唯立徳貽愛為不朽也昔之君子欲行仁義於天下則與時競馳不吝盈尺之璧而珍分寸之隂故大禹之趨時掛冠而不顧南榮之訪道踵趼而不休老子弟子問道老􅔶仲尼栖栖突不暇黔墨翟遑遑席不及煖皆行其徳義拯世危溺立功垂楷延芳百世今人退不知進臰腐榮華剗絶嗜慾被麗絃歌取媚泉石退不能披䇿樹勲毗贊明時空蝗粱黍枉没嵗華生為無聞之人歿成一棺之土亦何殊草木自生自死者哉嵗之秋也凉風鳴條清露變葉則寒蟬抱樹而長叫吟烈聲悲蟬近秋而悲怨酸瑟於落日之際何也哀其時命迫於嚴霜而寄悲於菀栁今日向西峯道業未就鬱聲於窮岫之隂無聞於休明之世已矣夫亦奚能不霑衿於將來染意於松煙者哉言菀第五十四忠孝者百行之寳歟忠孝不修雖有他善則猶玉屑盈匣不可琢為珪璋剉絲滿筐不可織為綺綬雖多亦奚以為也信讓者百行之順也誕伐者百行之悖也信讓乖禮迴而成悖誕伐合義翻而成順直躬證父葉公曰吾黨有直躬者父攘羊而子證之蒼梧讓兄蒼梧國人娶妻極美而讓與兄信讓悖也弦髙矯命商人也矯詐為君命大禹昌言臯陶謨禹拜昌言曰俞誕伐順也謂牧圉似桀紂艴然而怒比王侯於夷齊怡然而喜仁義所在匹夫為重仁義所去則尊貴為輕事可以心成理可以情通睇秋月明而知孀婦思聞林風響而見舟人驚陽氣主生物所樂也隂氣主殺物所憾也故春葩含日似笑秋葉泫露如泣夫善交者不以出入易意不以生死移情在終如始在始如終猶日月也故日之出入齊明月之生死同形天無情於生死則不可以情而憾怨故暄然而春榮華者不謝悽然而秋凋零者不憾榮凋有命困遇有期故春蘂雖茂假朝露而抽翠秋葉誠危因㣲風而飄零萬物居温則柔入寒則剛故春角可卷夏條可結秋露可凝冬木可折人皆愛少而惡老重榮而輕悴故簪珥英華而焚灰枯朽莫識枯朽生於英華英華歸於枯朽山抱玉故鑿之江懐珠則竭之豹佩文則剥之人含智則嫉之智能知人不能自知神能衛人不能自衛故神龜以智見灼靈虵以神見爆孰知不智為智不神為神乎妙必假物而物非生妙巧必因器而器非成巧是以羿無弧矢不能中㣲其中㣲者非弧矢也倕無斧斤不能善斵其善斵者非斧斤也畫以摹形故先質後文言以寫情故先實後辯無質而文則畫非形也不實而辯則言非情也紅黛飾容欲以為豔而動目者稀揮絃繁弄欲以為悲而驚耳者寡由於質不美也質不美者雖崇飾而不華曲不和者雖響疾而不哀理動於心而見於色情發於衷而形於聲故强懽者雖笑不樂强哭者雖哀不悲耳聞所惡不若無聞目見所惡不如無見故雷震必塞耳掣電必掩目為仁則不利為利則不仁故販粟者欲嵗之饑售藥者欲人之疾物各重其所主而桀紂之狗可以吠堯故盜跖之徒賢於盜跖而鄙仲尼運屈而恚天辱至而怨人是以火焚而怨燧人溺井而尤伯益宿不樹惠臨難而施恩本不防萌害成而修慎是以臨渇而穿井方饑而植禾雖疾無所及也公儀嗜魚屈到嗜芰雖非至味人皆甘之與衆同也文王嗜膽曽晳嗜棗膽苦棗酸聖賢甘之與衆異也鹿形似馬而迅於馬豺形似犬而健於犬國有千金之馬而無千金之鹿家有千金之犬而無千金之豺以犬馬有用而豺鹿無用也九流第五十五儒者晏嬰子思孟軻荀卿之類也順隂陽之性明教化之本遊心於六㙯留情於五常厚塟文服重樂有命祖述堯舜憲章文武宗師仲尼以尊敬其道然而薄者流廣文繁難可窮究也道者鬻熊老􅔶闗尹莊周之類也以空虚為本清浄為心謙挹為徳卑弱為行居無為之事行不言之教裁成宇宙不見其跡亭毒萬物不有其功然而薄者全弃忠孝杜絶仁義専任清虚欲以為治也隂陽者子韋鄒衍桑丘南父之類也敬順昊天厯象日月星辰敬受民時範三光之度隨四時之運知五行之性通八風之氣以厚生民以為政治然而薄者則拘於禁忌溺於術數也名者宋鈃尹文惠施公孫龍之類也其道主名名不正則言不順故定尊卑正名分愛平尚儉禁攻寢兵故作華山之冠以表均平之製則寛宥之説以示區分然而薄者捐本就末分折明辯茍析華辭也法者慎到李悝韓非商鞅之類也其術在於明罸討陣整法誘善懲惡俾順軌度以為治本然而薄者削仁廢義専任刑法風俗刻薄嚴而少恩也墨者尹佚墨翟禽滑胡非之類也儉嗇謙愛尚賢右鬼非命薄塟無服不怒俳鬭然而薄者其道大蹙儉而難遵也縱横者闞子龎煖蘇秦張儀之類也其術本於行仁譯二國之情弭戰争之患受命不受辭因事而制權安危扶傾轉禍就福然而薄者則茍尚華詐而弃忠信也雜者孔甲尉繚尸佼淮南之類也明隂陽通道徳兼儒墨合名法苞縱横納農植觸類取與不拘一緒然而薄者則蕪穢蔓衍無所係心也農者神農野老宰氏氾勝之類也其術在於務農廣為墾闢播植百榖國有盈儲家有蓄積倉廩充實則禮義生焉然而薄者若使王侯與庶人並耕於野無尊卑之别失君臣之序也觀此九家之學雖有深淺辭有詳畧說殊形反流分乖隔然皆同其妙理俱㑹治道跡雖有殊歸趣無異猶五行相滅亦還相生四氣相反而共相成嵗淄澠殊源同歸於海宫商異聲俱㑹於樂夷惠同操齊蹤為賢三子殊行等迹為仁道者𤣥化為本儒者徳教為宗九流之中二化為最夫道以無為化世儒以六藝濟俗無為以清虚為心六藝以禮教為訓若以教行於大同則邪偽萌生使無為化於成康則氛亂競起何者澆淳時異則風化應殊古今乖舛則政教宣隔以此觀之儒教雖非得真之説然兹教可以導物道家雖為達情之論而違禮復不可以救弊今治世之賢宜以禮教為先嘉遁之士應以無為是務則操業俱遂而身名兩全也劉子卷十
