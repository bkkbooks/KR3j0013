body:
  text: 劉子卷八北齊劉晝撰兵術第四十太古淳朴民心無欲淳澆則争起而戰萌生焉神農氏弦木為弧剡木為矢弧矢之利以威天下其後蚩尤强暴好習攻戰銷金為刄割革為甲而兵遂興矣黄帝戰於涿鹿神農世衰諸侯相侵伐帝習用干戈以征不享諸侯咸來賓而蚩尤作亂不用命乃徵師戰於涿鹿之野擒殺蚩尤顓頊爭於不周共工氏與顓頊戰於不周山共工氏敗績以頭觸不周堯戰丹水未詳舜征有苖苖民逆命帝乃誕敷文徳舞干戚于兩階七旬有苖格夏討有扈有扈氏賊侮五行怠棄三正啟召六卿以征之大戰于甘殷攻葛伯書曰葛伯仇餉湯一征自葛載周伐崇侯崇侯虎蔑侮父兄暴虐百姓文王伐之三旬不降退修徳教而復伐之因壘而崇降夫兵者凶器財用之蠧而民之殘也五帝三王弗能弭者所以禁暴而討亂非欲耗財以害民也然衆聚則財散鋒接則民殘勢之使然也故兵貴伐謀不重交刄百戰百勝非用兵之善也善用兵者不戰而勝善之善也王者之兵修正道而服人霸者之兵奇譎變而取勝夫將者國之安危民之性命不可不重故詔之於廟堂授之以斧鉞受命既已則設明衣鑿凶門臨軍之日則忘其親援桴擊鼓杖也鼓之時則忘其身用能無天於上無地於下無敵於前無顧於後以全國為重以智謀為先故將者必明天時辨地勢練人謀明天時者察七緯之情洞五行之趣聴八風之動鑒五雲之候辨地勢者識七舎之形别九地之勢若山陵之戰不逆髙水草之戰不涉深平地之戰不涉虚險練人謀者抱五徳之美握二柄之要五徳者智信仁勇嚴也二柄者賞罰也智以能謀信以約束仁以愛人勇以陵弱嚴以鎮衆賞以勸功罰以懲過故智者變通運奇之府也兵者詭道而行以其制勝也是以萬弩齊彀孫臏之奇龐㳙伐韓齊遣孫臏徃救兵寡不敵退減竈示弱㳙曰我知齊軍怯趍齊軍臏遂於馬陵險隘斫白樹而書曰龐㳙死此樹下㳙果夜至讀未畢萬弩俱發魏師大亂乃自剄千牛俱奔田單之䇿樂毅破齊地皆屬燕獨莒即墨未下田單乃收城中得牛千餘為絳繒衣畫以五彩龍文束兵刄於其角而灌脂束葦於其尾燒其端鑿城數十穴夜縱牛壯士五千隨其後牛尾熱怒而奔燕軍大敗盡復其城囊土壅水韓信之權信引兵伐齊齊請救於楚信令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走且喜曰知信怯也遂追渡水信使人决壅囊水大至龍且軍半不得渡擊殺龍且拽柴揚塵欒枝之譎晉國將也兵少勢弱使軍卒拽柴起塵楚望塵起以謂晉兵甚盛也舒車豕突尹子之術將車載猪以向軍營雲梯煙浮魯生之巧魯攻宋城使魯班造雲梯用奇出於不意少可以挫多弱可以折強况夫以衆擊寡以明攻昧兵形象水水之行避髙而就下兵之勢避實而擊虚避强而攻弱避治而取亂避鋭而擊衰故水因地而制形兵因敵而制勝則兵無成勢水無定形觀形而運奇隨勢而應變反經以為巧無形以成妙故風雨有形則可以帷幕捍寒暑無形不可以闗鑰遏也是以善攻者敵不知其所守如畏雷電擊無常處善守者敵不知其所攻如尋環中不見其際視吾之謀無畏敵堅視吾之堅無畏敵謀以此言之不可不知也夫將者以謀為本以仁為源謀以制敵仁以得人故謀能制敵者將也力能勝敵者卒也將以權決為本卒以齊力為先是以列宿滿天不及朧月形不一光不同也虎兕多力而受制於人者心不一力不濟也萬人離心不如百人同力千人遞戰不如十人俱至今求同心之衆必死之士在於仁恩洽而賞罰明猜忌胥靡者胥相也靡無也臨危難而不懼履水火而如歸非輕死而樂傷仁恩驅之也將得衆心必與同患暑不張盖寒不御裘所以均寒暑也隘險不乘丘陵必下所以齊勞逸也軍食熟然後敢食軍井通然後敢飲所以同饑渇也三軍合戰必立矢石之下所以共安危也故醇醪注流軍士通醉越勾踐行營有使獻酒一尊勾踐餉吾此酒衆不徧遂以酒㵼河中軍士於下飲之皆醉温辭一灑師人挾纊楚莊王出兵天大雪三軍皆凍王以温辭慰勞士卒聞之身皆如挾細綿茍得衆心則人競趨死以此衆戰猶轉石下山決水赴壑孰能當之矣閲武第四十一司馬法曰司馬穰苴兵法國家雖大好戰則亡天下雖安亡戰必危亟戰則民凋不習則民怠凋非保全之術怠非禦冦之方故兵不妄動而習武不輟所以養民命而修戎備也孔子曰以不教民戰是謂棄之易曰君子修戎器以備不虞是以春蒐夏苖秋獮冬狩皆於農隙以講武事三年而治兵習戰敵也出曰治兵始其事也入曰振旅言整衆也還歸而飲至告於廟所以昭文章明貴賤順少長辯等列習威儀夫三軍浩漫則立表號言不相聞故為鼓鐸以通其耳視不相見故制旌麾以宣其目若民不習戰則耳不聆鼔鐸之音目不察旌麾之號進退不應令疎數不成行故士未戰而震慄馬未馳而沐汗非其人怯而馬弱不習之所致也吳王宫人教之戰陣約之法令迴還進退盡中規矩雖蹈水火而不顧者非其性勇而氣剛教習之所成也鏌鎁不為巧者鋭而為拙者鈍然而巧以生勝拙而之負者習與不習也闔閭習武試其民於五湖劔皆加肩流血不肯止勾踐習戰試其民於寢宫民爭入水火死者千餘遽擊金而退之豈其惡生而貪死賞罰明而教習至也是以逄䝉善射不能用不調之弓就羿學射盡羿之術造父善御不能䇿不服之馬趙簡子七代祖為周穆王御馬上崑崙山般倕善斵不能運不利之斤神農時巧工也孫吳善將不能戰不習之卒貔貅戾獸而黄帝教之戰鷹鸇鷙鳥而羅氏教之擊夫鳥獸無知之性猶隨人指授而能戰擊者教習之功也奚况國之士民而不習武乎故射御慣習至於馳獵則能擒獲教習之所致也若弗先習覆跌是懼奚遽望獲今以練卒與不練卒交鋒若胡越爭游不競明矣是以先王因於閒隟大閲簡衆繕修戎器繕治也為國豫備也明權第四十二循理守常曰道臨危制變曰權權之為稱譬猶權衡也衡者測邪正之形權者揆輕重之勢量有輕重則形之於衡今加一環於衡左則右蹶加之於右則左蹶惟莫之動則平正矣人之於事臨危制變量有輕重平而行之亦猶此也古之權者審其輕重必當於理而後行焉易稱巽以行權語稱可以適道未可與權權者反於經而合於道反於義而後有善若唐棣之華反而更合也孝子之事親和顔卑體盡孝盡敬及其溺也則攬髪而拯之非敢侮慢以救死也故溺而捽父祝則名君勢不得已權之所設也慈愛者人之常情然大義滅親滅親益榮由於義也是故慈愛義方二者相權義重則親可滅若虞舜之放弟象傲周公之誅管叔武王克商立紂子武庚使三叔監其國武王崩成王幼周公攝政管叔疑公不利於孺子與武庚畔周公討而誅之石碏之殺子厚石碏衛大夫子厚作亂碏殺之季友之酖叔牙季友慶父皆魯莊公弟也公有疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公薨般即位慶父弑之季友奔陳國人立閔公慶父恨不得立又使人弑之季友以僖公適邾慶父奔莒季友乃立僖公求慶父於莒莒人歸之季友遂殺慶父鴆叔牙以義權親此其類也欺父矯君臣子悖行然舜娶不告弦髙矯命者弦髙鄭國商徒將財璧欲向外國興販路遇秦君伐鄭髙謂之曰鄭君知秦師來而遣我將珍璧以獻秦師乃言鄭君知之必有豫備於是遂受其財而班師鄭國由是得存以絶祀之罪重於不告矯命之過輕於滅國權之義也夫有道則無權道失則權作道之於用猶衣冠之在身也權之輕重猶甲胄之衛體也介胄禦寇而不可常服權以理度而不可常用自非賢哲莫能處也貴速第四十三成務雖均機速為上决謀或同遲緩為下何者才能成功以速為貴智能决謀以疾為奇也善其事者若救火拯溺明其謀者猶驥捷矢疾今焚燃熛室則飛馳灌之湍波漂人必奔游拯之游者是善水之名也若穿井而救火則熛颺棟焚矣方鑿舟而拯溺則葬江魚之腹中矣驥所以見珍者以其日行千里也滿旬而取至則與駑馬均矣箭所以為貴者以其弦釋而至也窮日而取至者則與不至者同矣智所以為妙者以其應時而知也若事過而後知則與無智者齊矣昔吳起相楚貴族攻之起欲討讐而揷矢王屍吴起相楚用法嚴峻貴戚盡欲害起及悼王死宗室大臣作亂而攻起起走王尸而伏之擊起之徒因射刺起并中王之尸既塟太子立盡誅射起而并中王尸者焉陽虎在圍魯人出之虎欲報徳而傷之以戈桓子囚虎魯人守之虎曰汝能放我我自福汝於是得出遂曳戈以傷守門者謀不斯湏而讐徳兩報其智可謂應時而知矣張禄之入秦魏冉悔不先索而後行故勢移而身逐睢在魏被讒折脅摺齒伏匿更名姓入秦拜為客卿因間言宣太后専制穰侯擅權昭王大懼廢太后逐穰侯太史公曰秦所以稱帝於天下者穰侯之功也一夫開説身折勢奪而以憂死况於羇旅之臣乎晁錯之穴壖垣申屠悔不先斬而後奏故發憤而致死錯議以侵削諸侯嘉自絀所言不用疾錯錯為内史門東出不便更穿一門南出嘉奏以擅穿宗廟垣為門請誅錯帝曰錯所穿非真廟垣乃外堧垣且我使為之嘉謂長史曰吾悔不先斬錯乃先奏之為錯所賣歐血而死智不早决敗而方悔其智可謂與無智者同矣故有智而不能施非智也能施而不能應速者亦非智也諺曰力貴突智貴卒此之謂也觀量第四十四夫曲思於細者必忘其大鋭情於近者必略於逺由心不並持則事不兼通小有所係大必所忘也故仰而貫針望不見天俯而拾虱視不見地天地至大而不見者眸掩於針虱故也是以智者知小道之妨大務小察之傷大明捐棄細識舒散性情以斯觀之人有小察細計者知其必無遐志廣度亦可知矣奚以明之夫覩僬僥之節僬僥國人長三尺知非防風之脛防風國人長四丈視象之牙知其大於豕也見狸之尾知其小於豹也故覩一可以知百觀此可以明彼是以蹄窪之内不生蛟龍培塿之上不植松栢非水土之性有所不生乃其營宇隘也數粒而炊庚桑子也析薪而㸑楊朱也非茍為艱難由性褊恡而細碎也項羽不學一藝少時學書不成去學劍又不成梁怒籍曰書足以記名姓而已劍一人敵不足學學萬人敵梁乃教籍兵法韓信不營一飱不治生商賈常從人寄食人多厭之非其心不愛藝口不嗜味由其性大不綴細業也晉文種米曽子植羊非性闇憃不辯方隅以其運大不習小務也智伯庖人亡炙一筐而即知之韓魏將反而不能知邯鄲子陽園亡一桃而即覺之其自亡也而不能知斯皆鋭情於小而忘大者也夫釣者雖有籊竿纎綸芒鈎芳餌増以詹何之妙不能與罾罟爭多詹何古之善釣者繭絲為綸屈針為鈎半米為餌垂於萬仭之淵獲盈車之魚弋者挾繁弱之弓貫㑹稽之箭加以蒲且之巧不能與罻羅競獲蒲且楚國善射弋者何者術小故也江河之流爛胔漂屍縱横接連而人飲之者量大故也盆盂之水䑕尾一曳必嘔吐而弃之者量小故也枳棘之生數寸而抽枝豫樟之植百尺而蒔柯其何故耶豈非質小者枝條穊而體大者節目踈乎是以達者之懐則滉瀁而無涯褊人之情必刻覈而煩細自上觀之趨舍之跡寛隘之量斷可識矣劉子卷八
