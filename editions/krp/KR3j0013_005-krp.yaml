body:
  text: 劉子卷五北齊劉晝撰通塞第二十三命有否泰遇有屈伸否與泰相翻屈與伸殊致邀泰遇伸不盡叡智遭否㑹屈不専膚蔽何者否泰由命屈伸在遇也命至於屈才通理壅遇及於伸才壅跡通通之來也非其力所招壅之至也非其智所迴勢茍就壅則口目雙掩遇必屬通則聲眺俱明故處穴犬呼聲鬱數仞順風長呌響通百里入井望天不過圓盖登峰眺日極於煙際向在井穴之時聲非卒嗄目非暴昧而聞見局者其勢壅也及其乘風蹈峰聲非孟賁目非離婁而響徹眺逺者其勢通也買臣忍饑而行歌王章苦寒而坐泣蘇秦握錐而憤懣班超執筆而慷慨當彼四子勢屈之時容色黧黒神情沮忸言為瓦礫行成狂狷髪露心憂影銷貌悴引歎而雷轉噴氣則雲湧如騏驥之伏於鹽車𤣥猿之束於籠圏非無千里之駃萬仞之捷然而不異羸鈍者無所肆其巧也何異處穴而望聲徹入井而欲睇博哉及其勢伸志得或佩錦而還鄉朱買臣或聲玉於廊廟王章或合縱於六國之内蘇秦或懸旌於崑崙之外班超當斯之時也容彩光液神氣開發言成金玉行為世則乘肥衣輕怡然自得漂若輕鴟之汎長風沛若吞舟之颺大壑何異順風而縱聲登峰而長眺人猶是也而昔如彼今如此者非謂昔愚而今賢故醜而新美壅之與通也水之性清動壅以堤則波縮而氣腐決之使通循勢而行從澗而轉雖有朽骸爛卉不能汚也非水之性異通之與壅也人之通猶水之通也出如流泉假有沙塵弗能汚也以是觀之通塞之路與榮悴之容相去逺矣遇不遇第二十四賢有常質遇有常分賢不賢性也遇不遇命也性見於人故賢愚可定命在於天則否泰難期命運應遇危不必禍遇不必窮命運不遇安不必福賢不必達故患齊而死生殊徳同而榮辱異者遇不遇也春日麗天而隱者不照秋霜被地而蔽者不傷遇不遇也昔韓昭侯醉卧而寒典冠加之衣覺而問之知典冠有愛於己也以越職之故而加誅焉衛之驂乘見御者之非從後呼車有救危之意不蒙其罪加之以衣恐主之寒呼車憂君之危忠愛之情是同越職之愆亦等典冠獲罪呼車見徳遇不遇也鴟墮腐䑕非虞氏之慢缾水沃地非射姑之穢事出慮外固非其罪而俠客大怒虞氏見滅邾君大怒而射姑獲免遇不遇也齊之華士栖志丘壑而太公誅之魏之干木遁代幽居而文侯敬之太公之賢非有減於文侯干木之徳非有逾於華士而或榮或戮者遇不遇也董仲舒智徳冠代位僅過士田千秋無他殊操以一言取相同遇明主而貴賤懸隔者遇不遇也莊姜適衛美而無寵宿瘤適齊醜而䝉幸遇不遇命也賢不賢性也怨不肖者不通性也傷不遇者不知命也如能臨難而不懾貧賤而不憂可謂達命者矣命相第二十五命者生之本也相者助命而成者也命則有命不形於形相則有相而形於形有命必有相有相必有命同稟於天相須而成也人之命相賢愚貴賤修短吉凶制氣結胎受生之時其真妙者或感五帝三光或應龍跡竒夢降及凡庶亦稟天命皆屬星辰其值吉宿則吉值凶宿則凶受氣之始相命既定即鬼神不能移改而聖智不能迴也華胥履大人之跡而生伏羲女蝸感瑶光貫日而生顓頊慶都與赤龍合而生唐堯握登見大虹而生虞舜修紀見洞流星而生夏禹扶都見白氣貫月而生殷湯太姙夢見長人而生文王顔徴感黒帝而生孔子劉媪感赤龍而生漢祖薄姬感蒼龍而生文帝微子感牽牛星顔淵感中台星張良感弧星樊噲感狼星老子感火星若此之類皆聖賢受天瑞相而生者也相者或見肌骨或見聲色賢愚貴賤修短吉凶皆有表診故五岳崔嵬有峻極之勢四瀆皎潔有川流之形五色鬱然有雲霞之觀五聲鏗然有鐘磬之音善觀察者猶風胡之别刃孫陽之相馬覽其機妙不亦難乎伏羲日角黄帝龍顔帝嚳鳶肩顓頊骿骭堯眉八采舜目重瞳禹耳三漏湯肩二肘文王四乳武王􅀈齒孔子返宇顔回重瞳臯繇烏喙若此之類皆聖賢受天殊相而生者也舜目重瞳是至明之相而項羽王莽亦目重瞳子越王勾踐長頸烏喙非善終之象而夏禹亦長頸烏喙王莽之重瞳譬駑馬有驥之一毛而不可謂之驥也勾踐長頸烏喙猶虵有龍之一鱗而不可謂之龍也爰及衆庶皆有診相故榖子豐下叔興知其有後衛青方顙黥徒明其富貴亞夫縱理許負見其餓死羊鮒聲豺叔姬鑒其滅族命相吉凶懸之於天命當貧賤雖富貴猶有禍患命當富貴雖欲殺之猶不能害夏孔甲畋於箕山大風晦暝入於人家主人方乳或占之曰后來而産是子不勝終必有殃孔甲取之曰茍以為余子誰敢殃之子長折薪斧斬其左足遂為大閽孔甲曰嗚呼有天命矣夫漢文以夢而寵鄧通相者占通當貧餓死帝曰能富在我何謂貧乎與之銅山専得冶鑄後假衣食寄死人家子文之生妘子弃之虎乃乳之遂收養焉卒為楚相襃離國王侍婢有娠王欲殺之婢曰氣從天來故我有娠及子之産捐猪圏中猪以氣噓之弃馬櫪中馬復噓之故得不死卒為夫餘之王故善惡之命若從天墮若從地出不得以理數推非可以智力要今人不知命之有限而妄覬於非分命在於貧賤而穿鑿求富貴命在於短折而臨危求長壽皆惑之甚者也妄瑕第二十六大道混然無形寂然無聲視之不見聴之不聞非可以影響求不得以毁譽稱也降此以徃則事不雙美名不竝盛矣雖天地之大三光之明聖賢之智猶未免乎訾也故天有拆之象地有裂之形日月有謫蝕之變五星有孛彗之妖堯有不慈之誹舜有囚父之謗湯有放君之稱武有殺主之譏齊桓有貪淫之目晉文有不臣之聲伊尹有誣君之迹管仲有僭上之名以夫二儀七耀之聖不能無虧沴堯舜湯武之聖不能免於嫌謗桓文伊管之賢不能無纎瑕之過由此觀之宇宙庸流能自免於怨謗而無悔恡耶是以荆岫之玉必含纎瑕驪龍之珠亦有㣲纇然馳光於千里飛價於侯王者以小惡不足以傷其大美也今忌人之細短忘人之所長以此招賢是畫空而尋跡披水而見路不可得也定國之臣亦有細短人主所以不弃之者不以小妨大也以小掩大非求士之謂也伊尹夏之庖厨傅説殷之胥靡百里奚虞之亡虜段干木魏之大駔此四子者非不賢也而其迹不免汚也名不兩盛事不俱美昔魏文侯問於李克曰吳起何如人也克對曰起貪而好色然其善用兵司馬穰苴不能過也乃以為将拔秦五城北滅燕趙葢起之力也魏無知薦陳平於漢王或人讒之曰平雖美丈夫如冠玉耳其中未必有可用也且聞盜嫂而受金王乃疎平讓無知無知曰臣進䇿謀之士誠足以利國耳且其小過豈妨公家之大務哉乃擢為䕶軍得施其䇿故范増疽發死而楚國亡閼氏開陣而漢軍全者平之謀也髙祖弃陳平之小諐音愆採六奇之大謀文侯捨吴起之小失而取五城之功向使二主以其小過弃彼良材則魏國之存亡不可知漢楚之雄雌未可決也而吴起必埋名於貪好陳平陷身於賄盜矣俗之觀士者見其威儀屑屑好行細潔乃謂英彦士有大趣不脩容儀不惜小檢而謂之弃人是見朱橘一子蠧因剪樹而棄之覩縟錦一寸㸃乃全匹而燔之齊桓深知寗戚將任之以政羣臣争讒之曰寗戚衛人去齊不逺君可使人問之若果真賢用之未晚也公曰不然患其有小惡者民人知小惡忘其大美此世所以失天下之士也乃夜舉火而爵之以為卿相九合諸侯一匡天下桓公可謂善求士矣故仲尼見人一善而忘其百非鮑叔聞人一過而終身不忘夫子如斯之𢎞鮑叔如斯之隘也以是觀之聖哲之量相去逺矣牛躅之洼不生魴鱮巢幕之窠不容鵠卵崇山廓澤不辭汚穢佐世良材不拘細行何者量小不足以包大形器大無分小瑕也人之情性皆有細短若其大畧是也雖有小過不足以為累若其大畧非也雖有衡門小操未足與論大謀樊噲屠販之豎蕭曹斗筲之吏英布刑墨之𨽻周勃俳優之任其行皆中律其質則將才也張景陽郢中之大奸也而威諸侯顔濁鄒梁父之大盜也而為齊勲臣此皆有所短然而功名不朽者大畧得也爰旌目鮑焦立節抗行不食非義之食乃餓而死不能立功拯溺者小節不申而大節屈也伯夷叔齊冰清玉潔義不為孤竹之嗣不食周粟餓死首陽楊朱全身養性去脛之一毛以利天下則不為也若此二子徳非不茂行非不髙亦能安治理紊蹈白刄而達功名乎此可以為百代之庸軌不可居伊管之任也適才第二十七物有美惡施用有冝美不常珍惡不終弃紫貂白狐製以為裘鬱若慶雲皎如荆玉此毳衣之美也壓菅蒼蒯編以蓑芒葉㣲疎絫黯若朽穰此卉服之惡也裘蓑雖異被服實同美惡雖殊適用則均今處繡戸洞房則蓑不如裘被雪沐雨則裘不及蓑以此觀之適才所施隨時成務各有冝也伏臘合歡必歌採菱牽石拖舟則歌噓􅤍非無激楚之音然而弃不用者方引重抽力不如嘘􅤍之冝也卞莊子之昇殷庭也鳴佩趨蹌温色怡聲及其搏虎必攘袂鼓肘瞋目震嘑非不知温顔下氣之美然而不能及者方格猛獸不如攘袂之冝也安陵神童通國之麗也八音繁㑹使以噭吹囋聲而人悦之則不及瞽師侏儒之美虵銜之珠百代之傳寳以之彈鵄則不如泥丸之勁也棠谿之劔天下之銛也用之穫穗曽不如鈎鎌之功也此四者美不常珍惡不終廢用各有冝也昔野人弃子貢之辯而悦馬圉之辭越王退吹籟之音而好鄙野之聲非子貢不及馬圉吹籟不若野聲然而美不必合惡而見珍者物各有用也水火金木土榖六府異物而皆有施規矩權衡準繩六法殊形而各有任故伊尹之興土功也長脛者使之跖钁强脊者使之負土眇目者使之準繩傴僂者使之塗地因事施用仍便效才各盡其分而立功焉商歌之士鷄鳴之客才各有施不可弃也若使寗子結客於孟嘗則未免追軍之至囚繫之辱也若使鷄鳴託於齊桓必不能光輔於霸道九合諸侯也時湏過闗莫若雞鳴欲隆霸主莫若商歌商歌之雅而雞鳴之鄙雖美惡有殊至於適理排難其揆一也楚之市偷天下之大盜而能却齊軍雖使孫吳用兵彼必與之拒戰未肯有望風而退也晉之叔魚一國之佞邪也而能歸季孫雖使甘蘇聘説彼必與之較辯不至恐懾而逃還也大盜讒佞民之殘害無用之人也茍有士術猶能為國興利除害矧乃明智錬才其為大益豈可弃耶闗雎興於鳥而為風之首美其摯而有别也鹿鳴興於獸而為雅之端嘉其得食而相呼也以夫鳥獸之醜茍有一善詩人歌詠以為美談奚况人之有善而可弃乎夫檉栢之斷也大者為之棟梁小者為之椽桁直者中繩曲者中鈎隨材所施未有可弃者是以君子善能拔士故無弃人良匠善能運斤故無弃材是以人物交泰各盡其分而立功焉詩云雖有絲麻無弃菅蒯雖有姜姬無忘憔悴此之謂也劉子卷五
