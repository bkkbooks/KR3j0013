body:
  text: 劉子卷九北齊劉晝撰隨時第四十五時有淳澆俗有華戎不可以一道治不可以一體齊也故無為以化三皇之時法術以禦七雄之世徳義以柔中國之心政刑以威四夷之性故易貴隨時禮尚從俗適時而行也霜風慘烈周棄不蓻禾炎氣赫曦曹明不製裘知時不可也貿章甫者不造閩越二國名在海南衒赤舄者舄履也赤色也不入跣獠獠人首不加冠足不躡履知俗不冝也故救餓者以圓寸之珠不如與之橡栗木子也貽溺者以方尺之玉不如與之短綆折繩也非橡綆之貴而珠玉之賤然而美不要者各在其所急也方於饑溺之時珠玉寧能救生死哉是以中河失船一瓠千金貴賤無常時使然也昔秦攻梁惠王謂孟軻曰先生不逺千里辱幸敝邑今秦攻梁先生何以禦乎孟軻對曰昔太王居邠狄人攻之事之以玉帛不可大王不欲傷其民乃去邠之岐今王奚不去梁乎惠王不悦夫梁所寳者國也今使去梁非不能去也非今日之所冝行也故其言雖仁義非惠王所須也亦何異救餓而與之珠拯溺而投之玉乎秦孝公問商鞅治秦之術鞅對以變法峻刑行之三年人富兵强國以大治威服諸侯以孟軻之仁義論大王之去邠而不合於世用以商君之淺薄行刻削之苛法而反以成治非仁義之不可行而刻削之為美由於淳澆異跡則政教冝殊當合縱之代而仁義未可全行也故明鏡所以照形而盲者以之盖巵玉笄所以飾首而禿嫗以之代杙非鏡笄之不美無用於彼也庖丁解牛適俗所傾晉文時庖厨人朱泙屠龍無所用功泙用千金從豢龍氏學屠龍術茍乖世務雖有妙術歸於無用故老􅔶至西戎而效㹫言夏禹入裸國忻然而解裳非欲忘禮隨俗冝也墨子儉嗇而非樂者若男為廢耕女為廢織之類徃見荆王衣錦吹笙非茍違性隨時好也魯哀公好儒服而削代君修墨而殘徐偃王行仁而亡燕噲為義而滅夫削殘亡滅暴亂之所招而此以仁義儒墨而遇之非仁義儒墨之不行行非其時之所致也風俗第四十六風者氣也俗者習也土地水泉氣有緩急聲有髙下謂之風焉人居此地習以成性謂之俗焉風有薄厚俗有淳澆明王之化當移風使之雅易俗使之正是以上之化下亦為之風焉民習而行亦為之俗焉是越之風好勇其俗赴死而不顧鄭衛之風好淫其俗輕蕩而忘歸晉有唐虞之遺風其俗節財而儉嗇齊有景公之餘化其俗奢侈以誇競陳太姬無子而好巫祝其俗事鬼神以祈福太姬周武王長女為陳侯夫人好事鬼欲求後嗣國人皆效之燕丹結客納勇士於後宫其俗侍妻妾於賓客燕丹使荆軻殺秦王厚為賓客禮納後宫妃嬪侍之燕國習以為常斯皆上之風化人習為俗也越之東有軫沐之國其人父死即負其母而棄之云是鬼妻不可與同居其長子生則解肉而食其母謂之冝弟楚之南有啖人之國其親死拆其肉而埋其骨謂之為孝秦之西有義渠之國其人死則聚柴而焚之煙上燻天謂之昇霞胡之北有射姑之國其親死則棄屍於江中謂之水仙斯皆四夷之異俗無足怪也是以先王傷風俗之不善故立禮教以革其弊制禮樂以和其性風移俗易而天下正矣利害第四十七利害者得失之本也得失者成敗之源也故就利而避害愛得而憎失物之恒情也人皆知就利而避害莫知縁害而見利皆識愛得而憎失莫識由失以至得有知利之為害害之為利得之成失失之成得則可與談利害而語得失矣夫内熱者之飲毒藥非不害也疽痤用砭石非不痛也然而為之者以小痛來而大痛滅則細害至巨害除也饑而倍食渇而大飲熱而投水寒而入火雖暫怡性必為後患菖蒲香草去蚤虱而來蚰蜒百足蟲也礬石止齒齲之痛而朽牙根躁痛雖餌必至生害此取小利而忘大利惟去輕害而負重害也瘕疾填胷而不敢破蠆尾螫跗而不敢斫非好疾而愛毒以破斫之患甚於疾螫也酖酒盈巵渇者弗飲非不渇也飲之立死銷金在罏盜者弗掬非不欲也掬而灼爛虓虎三目虎亦母虎在前地有隋珠隋侯珠也雖貪如盜蹠栁下惠弟則手不暇拾懸彀向心路有西施吳王妃也雖淫如景陽楚人仕至大夫則目不暇視非不愛寳而悦色然而不顧者利緩而害急也昔齊有貨美錦於市盜於衆中而竊之吏執而問曰汝何盜錦於衆中對曰吾但見錦不見有人故取之耳若斯人者眩於利而忘於害黄口以貪餌而忘害故擒於羅者雀初生皆黄口孔子見羅者問曰小雀易獲大雀難獲何也對曰小雀貪餌而大雀奸猾故也異鵲以見利而忘身且􅇶於莊周雕陳園有鵲尾長七尺周持彈射之心怵惕曰此乃王栗園王如知之言我偷王栗於是挾彈而退是以智者見利而思難闇者見利而忘患思難而難不至忘患而患反生以是觀之利害之道去就之理亦以明矣禍福第四十八禍福同根妖祥共域禍之所倚反而為福福之所伏還以成禍妖之所見或能為吉祥之所降亦迴成凶有知禍之為福福之為禍妖之為吉祥之為凶則可與言物類矣吴兵大勝以為福也而有姑蘇之困越棲㑹稽以為禍也而有五湖之霸戎王即犬戎也强盛以為福也而有樽下之執陳駢出奔以為禍也終有厚遇之福陳公子齊出奔於齊侯妻之以女禍福迴旋難以類推昔宋人有白犢之祥而有失明之禍雖有失明之禍以至獲全之福北叟有胡馬之利卒有奔墜之患雖有奔墜之患以至保身之福是以見不祥而修善則妖反為祥見祥而不為善即祥還成妖矣昔武丁之時亳有桑榖拱生於朝史占之曰野草生朝朝其亡乎武丁恐懼側身修徳桑榖自枯八紘之内重譯而來殷道中興帝辛之時有雀生鳶貪惡鳥也於城之隅史占之曰以小生大國家必王帝辛驕暴遂亡殷國故妖孽者所以警王侯也怪夢者所以警庶人也妖孽不勝善政則凶反成吉怪夢不勝善言則禍轉為福人有禍必懼懼必有敬敬則有福福則有喜喜則有驕驕則有禍是以君子祥至不深喜逾敬慎以儉誡其身妖見不為慼逾修徳以為務故招慶於神祗災消而福降也貪愛第四十九小利大利之蠧小􅈔大禍之津茍貪小利則大利必亡不遺小􅈔則大禍必至昔蜀侯性貪秦惠王聞而欲伐之山澗峻嶮兵路不通乃琢石為牛多與金帛置牛後號牛糞之以遺蜀侯蜀侯貪之乃塹山填谷使五丁力士以迎石牛秦人帥師隨後而至滅國亡身為天下所笑以貪小利失其大利也楚白公勝其性貪􅈔既殺子西據有荆國積歛財寳填之府庫不以分衆石乞諌曰今患至國將危不顧勝敗存亡之機固以形於胸中矣不能散財以求人心則不如焚之無令彼衆還以害我又不能從及葉公入乃發大府之財以與衆出府之寳以賜人因而攻之十有九日白公身滅財非已有而欲有之以此小􅈔而大禍生焉寒山有獸其名曰􅭼其角當心俯而磨之潰心而死炎州有鳥其名曰梟嫗伏其子百日而長羽翼既成食母而飛蜀侯之貪石牛牛逾近而身轉危何異􅭼磨其角角逾利而身速亡乎白公之貪財財逾積而身逾滅何異梟之養子子逾長而身就害也是以達人覩禍福之機鑒成敗之源不以茍得自傷不以過􅈔自害老子云多藏必厚亡禮云積而能散皆明止足之分祛貪􅈔之萌也類感第五十方以類聚物以羣分聲以同應氣以異乖其類茍聚雖逺不離其羣茍分雖近未合故銅山崩蜀鍾鳴于晉晉時蜀地銅山崩天下銅器盡鳴應淄澠共川色味異質晉王以淄澠二水合羮與張華飲華曰此羮有淄澠二水味也感應必類自然之數也是以飛行者陽之羣也蟄伏者隂之類也故曰夏至而麈角解月虧而蚌蛤胎月晦即珠生月明變成蚌山海經曰月生而蚌蛤消麒麟鬭而日蝕鯨魚死而彗星出東風至而酒盈溢蠶含絲而商絃絶新榖祭而舊榖缺龍舉一井而雲彌九天虎嘯一谷而風扇萬里陽燧在掌而太陽火方珠運握而少陽水類感之也箕麗於月而飄風起畢動於天而驟雨散天將風也纎塵不動而䲰自鳴旦且雨也寸雲未布而蟻蚓移矣巢居知風穴處識雨風雨方至而鳥蟲應之太白暉芒鷄必夜鳴火精光盛馬必晨驚鷄為兑禽金為兵精馬者離畜火為武神干戈熾興介駟將動而禽獸應之鼃鳴於野鼈應於淵螣虵雄鳴於上風雌鳴於下風而化成形以斯至精相應不待召而自感者類之所應也若呼之與響形之與影故抱薪投火燥者先燃平地注水濕者先濡彈角則目揺鼓舟而波涌物以類相感神以氣相化也豈以人情者哉劉子卷九
