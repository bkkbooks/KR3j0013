body:
  text: 卷第九隨時第四十五時有淳澆俗有華戎不可以一道治不得以一體齊也故無為以化三皇之時法術以禦七雄之世德義以柔中國之心政刑以威四夷之性故易貴隨時禮尚從俗適時而行也霜風慘烈周棄不蓻禾炎氣赫曦曹明不製裘知時不可也貿章甫者不造閩越衒赤舄者不入跣㹫知俗不宜也故救餓者以圓寸之珠不如與之橡𦬱貽溺者以方尺之玉不如與之短綆非橡綆之貴而珠玉之賤然而美不要者各在其所急也方於饑溺之時珠玉寧能救生死哉是以中河失舩一瓠千金貴賤無常時使然也昔秦攻梁惠王謂孟軻曰先生不遠千里辱幸弊邑今秦攻梁先生何以禦乎孟軻對曰昔大王居邠狄人攻之事之以玉帛不可大王不欲傷其民乃去邠之岐今王奚不去梁乎惠王不悅夫梁所寶者國也今使去梁非不能去也非今日之所宜行也故其言雖仁義非惠王所須也亦何異救餓而與之珠拯溺而投之玉乎秦孝公問啇鞅治秦之術鞅對以變法峻刑行之三年人富兵強國以大治威服諸侯以孟軻之仁義論大王之去邠而不合於世用以商君之淺薄行刻削之苛法而反以成治非仁義之不可行而刻削之為美由于淳澆異跡則政教宜殊當合縱之代而仁義未可全行也故明鏡所以照形而肓者以之蓋卮玉笄所以飾首而禿嫗以之桂杙非鏡笄之不美無用於彼也庖丁解牛適俗所傾朱泙屠龍無所用功苟乖世務雖有妙術歸於無用故老聃至西戎而效夷言夏禹入躶國忻然而解裳非欲忘禮隨俗宜也墨子儉嗇而非樂者往見荊王衣錦吹笙非苟違性隨時好也魯哀公好儒服而削代君修墨而殘徐偃公行仁而亡燕噲為義而滅夫削殘亡滅暴亂之所招而此以仁義儒墨而遇之非仁義儒墨之不行行非於時之所致也風俗第四十六風者氣也俗者習也土地水泉氣有緩急聲有高下謂之風焉人居此地習以成性謂之俗焉風有薄厚俗有淳澆明王之化當移風使之雅易俗使之正是以上之化下亦為之風焉民習而行亦為之俗焉是越之風好勇其俗赴死而不顧鄭衛之風好淫其俗輕蕩而忘歸晉有唐虞之遺風其俗節財而儉嗇齊有景公之餘化其俗奢侈以誇競陳太姬無子而好巫祝其俗事鬼神以祈福燕丹結客納勇士於後宮其俗侍妻妾於賓客斯皆上之風化人習為俗也越之東有軫沐之國其人父死即負其母而棄之云是鬼妻不可與同居其長子生則解肉而食其母謂之宜弟楚之南有啖人之國其親死拆其肉而埋其骨謂之為孝秦之西有義渠之國其人死則聚柴而焚之煙上燻天謂之昇霞胡之北有射姑之國其親死則棄屍於江中謂之水仙斯皆四夷之異俗無足怪也是以先王傷風俗之不善故立禮教以革其弊制禮樂以和其性風移俗易而天下正矣利害第四十七利害者得失之本也得失者成敗之源也故就利而避害愛得而憎失物之恒情也人皆知就利而避害莫知緣害而見利皆識愛得而憎失莫識由失以至得有知利之為害害之為利得之成失失之成得則可與談利害而語得失矣夫內熱者之飲毒藥非不害也疽痤用砭石非不痛也然而為之者以小痛來而大痛滅則細害至巨害除也饑而倍食渴而大飲熱而投水寒而入火雖暫怡性必為後患菖蒲去蚤虱而來蚰蜒樊石止齒齲之痛而朽牙根躁痛雖餌必至生害此取小利而忘大利惟去輕害而負重害也瘕疾填胸而不敢鈹蠆尾螫跗而不敢斫非好疾而愛毒以破斫之患疾螫也酖酒盈卮渴者弗飲非不渴也飲之立死銷金在罏盜者弗掬非不欲也掬而灼爛虓虎在前地有隋珠雖貪如盜蹠則手不睱拾懸彀向心路有西施雖淫如景陽則目不暇視非不愛寶而悅色然而不顧者利緩而害急也昔齊有貨美錦於市盜於眾中而竊之吏執而問曰汝何盜錦於眾中對曰吾但見錦不見有人故取之耳若斯人者眩於利而忘於害黃口以貪餌而忘害故擒於羅者異鵲以見利而忘身且於莊周是以智者見利而思難闇者見利而忘患思難而難不至忘患而患反生以是觀之利害之道去就之理亦以明矣禍福第四十八禍福同根祅祥共域禍之所倚反而為福福之所伏還以成禍祅之所見或能為吉祥之所降亦廻成凶有知禍之為福福之為禍祅之為吉祥之為凶則可與言物類矣吳兵大勝以為福也而有姑蘇之困越棲會稽以為禍也而有五湖之霸戎王強盛以為福也而有樽下之執陳駢出奔以為禍也終有厚遇之福禍福廻旋難以類推昔宋人有白犢之祥而有失明之禍雖有失明之禍以至獲全之福北叟有胡馬之利卒有奔墜之患雖有奔墜之患以至保身之福是以見不祥而修善則祅反為祥見祥而不為善即祥還成祅矣昔武丁之時毫有桑穀拱生于朝史占之曰野草生朝朝其亡乎武丁恐懼側身修德桑穀自枯八宏之內重譯而來殷道中興帝辛之時有雀生鳶於城之隅史占之曰以小生大國家必王帝辛驕暴遂亡殷國故祅孽者所以警王侯也怪夢者所以警庶人也妖孽不勝善政則凶反成吉怪夢不勝善言則福轉為禍人有禍必懼懼必有敬敬則有福福則有喜喜則有驕驕則有禍是以君子祥至不深喜逾敬慎以儉誡其身祅見不為慼逾修德以為務故招慶於神祇災消而福降也貪愛第四十九小利大利之殬小𠫤大禍之津苟貪小利則大利必亡不遺小𠫤則大禍必至昔蜀侯性貪秦惠王聞而欲伐之山澗逡嶮兵路不通乃琢石為牛多與金帛置牛後號牛糞之以遺蜀侯蜀侯貪之乃塹山填谷使五丁力士以迎石牛秦人帥師隨後而至滅國亡身為天下所笑以貪小利失其大利也楚白公勝其性貪𠫤既殺子西據有荊國積斂財寶填之府庫不以分眾石乞諫曰今患至國將危不顧勝敗存亡之機固以形於胸中矣不能散財以求人心則不如焚之無令彼眾還以害我又不能從及葉公入乃發大府之財以與眾出府之寶以賜人因而攻之十有九日白公身滅財非己有而欲有之以此小𠫤而大禍生焉寒山有獸其名曰孢其角當心俯而磨之憒心而死炎州有鳥其名曰梟傴伏其子百日而長羽翼既成食母而飛蜀侯之貪石牛牛逾近而身轉危何異孢磨其角角逾利而身速亡乎白公之貪財財逾積而身逾滅何異梟之養子子逾長而身就害也是以達人覩禍福之機鑒成敗之源不以苟得自傷不不以過𠫤自害老子云多藏必厚忘禮云積而能散皆明止足之分祛貪𠫤之萌也類感第五十方以類聚物以群分聲以同應氣以異乖其類苟聚雖遠不離其群苟分雖近未合故銅山崩蜀鍾鳴于晉淄澠共川色味異質感應必類自然之數也是以飛行者陽之群也蟄伏者陰之類也故曰夏至而鹿角解月虧而蚌蛤胎麒麟鬭而日蝕鯨魚死而彗星出東風至而酒盈溢蚕含絲而商絃絕新穀祭而舊穀缺龍舉一井而雲彌九天虎嘯一谷而風扇萬里陽燧在掌而太陽火方珠運握而少陽水類感之也箕麗于月而飄風起畢動于天而驟雨散天將風也纖塵不動而䲰自鳴旦且雨也寸雲未布而蟻蚓移矣巢居知風宂處識雨風雨方至而鳥蟲應之太白暉芒雞必夜鳴火精光盛馬必晨驚雞為兌禽金為兵精馬者離畜火為武神干戈戢興介駟將動而禽哭應之鼃鳴于野鱉應于淵騰虵雄鳴於上風雌鳴於下風而化成形以斯至精相應不待召而自感者類之所應也若呼之與響形之與影故抱薪投火燥者先燃平地注水濕者先濡彈角則目搖鼓舟而波涌物以類相感神以氣相化也豈以人情者哉
