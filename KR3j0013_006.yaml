body:
  text: 卷第六文武第二十八規者所以法圓裁局則乖矩者所以象方製鏡必背輪者所以輾地入水則溺舟者所以涉川施陸必躓何者方圓殊形舟車異用也雖形殊而用異而適用則均者盛暑炎蒸必籍涼風寒交冰結必處溫室夏不御毯非憎惡之炎有餘也冬不臥簟非怨讎之涼自足也不以春日遲遲而毀羔裀秋露灑葉而剔筍席白羽相望霜刃競接則文不及武干戈既韜禮樂聿修則武不及文不可以九畿慴然而棄武四郊多壘而擯文士用各有時未可偏無也五行殊性俱為人用文武異材並為大益猶救火者或提盆榼或挈瓶盂其器方圓形體雖返名質相乖至於盛水滅火功亦齊焉繳者身仰釣者身俯俯仰別狀取利同焉織者漸進耕者漸退進退異勢成務等焉黑子救宋重趼而行干木在魏身不下堂行止異跡存國一焉文以讚治武以凌敵趍舍殊律為績平焉秦之季葉土崩瓦解漢祖躬提三尺之劍為黔首請命跋涉山川蒙犯矢石出百死以續一生而爭天下之利奮武厲誠以決一旦之命當斯之時冠章甫衣縫掖未若戴金冑而擐犀甲也嬴項既滅海內大定以武創業以文止戈徵鄒魯諸生而制禮儀修六代之樂朝萬國於咸陽當此之時修文者榮顯習武者慚忸一世之間而文武遽為雄雌以此言之治亂異時隨務用才也今代之人為武者則非文為文者則嗤武各執其所長而相是非猶以宮笑角以白非黑非適才之情得實之論也均任第二十九為有寬隘量有巨細材有大小則任其輕重所處之分未可乖也是以萬碩之鼎不可滿以盂水一鈞之鐘不可容於泉流十圍之木不可蓋以茅茨榛棘之柱不可負於廣廈何者小非大之量大非小之器重非輕之任輕非重之制也以大量小必有枉分之失以小容大則致傾溢之患以重處輕必有傷折之過以輕載重則致壓覆之害故鵾鵬一軒橫厲寥廓背負蒼天足蹠浮雲有六翮之資也驃𩦫一鶩騰光萬里絕塵掣徹有迅足之勢也今以鷰雀之羽而慕沖天之迅犬羊之蹄而覬追日之步勢不能及亦可知也故奔蜂不能化藿蠋而越鷄不能伏鵠卵而魯鷄能伏之夫藿與螟蛉俱蟲也魯鷄與越鷄同禽也然化與不化伏與不伏者藿大越小也夫龍虵有翻騰之質故能乘雲依霧賢才有政理之德故能踐勢處位雲霧雖密蟻蚓不能昇者無其質也勢位雖高庸敝不能治者乏其德也故智小不可以謀大德狹不可以處廣以小謀大必危以挾處廣必敗子游治武城仲尼發割鷄之歎尹何為邑宰子產出製綿之諫德小而任大謂之濫也德大而任小謂之降也而其失也寧降無濫是以君子量才而授任量任而授爵則君無虛授臣無虛任故無負山之累折足之憂也慎言第三十日月者天之文也山川者地之文也言語者人之文也天文失則有謫蝕之變地文失則有崩竭之災人文失必有傷身之患故口者言語之門戶舌者門戶之關鑰關鑰動則門戶開門戶開則言語出出言之善則千里應之出言之惡則千里違之言失於己不可遏於人情發於近不可止於遠是以君子慎其關鑰以密言語言語在口譬含鋒刃不可動也動鋒刃者必傷喉舌言失之害非惟鋒刃其所傷者不惟喉舌故天有卷舌之星人有緘口之銘所以警恌言防口訧也口舌者患禍之宮亡滅之府也語言者性命之所屬而形骸之所係也言出患入語失身亡身亡不可復存言出不可復追其猶射也懸機未發則猶可止矢一離絃雖欲返之弗可得也易誡樞機詩刺言玷斯言一玷非礛䃴所磨樞機既發豈駭電所追皆前聖之至慎後人之埏鎔明者慎言故無失言闇者輕言自致害滅昔智伯失言於水灌韓魏躡其肘足魏武漏語於英雄玄德遺其匕筯是以頭為穢器師馳徐州地分三晉土割岷蜀亡敗長釁為天下笑不慎言也韓昭侯與棠磎公謀而終夜獨寢慮夢言露於妻妾也孔光不對溫室之樹恐言之泄於左右也言者風也無足而行無翼而飛不可易也是以聖人當言而懼發言而憂如蹈水火臨危嶮也禮然後動則動如春風人不猒其動時然後言則言如金石人不猒其聲故身無失行口無過言也貴言第三十一越劍性銳必託槌砧以成純鉤楚柘質勁必資搒檠以成弴弓人性雖敏必藉善言以成德行故槌砧者夷不平也搒檠者矯不正也善言者正不善也人目短於自見故借鏡以觀形髮拙於自理必假櫛以修束心闇於自炤則假言以策行面之所以形明鏡之力也髮之所以理玄櫛之功也行之所以策善言之益也鏡櫛理形其惠輕也善言成德其惠重也人皆悅鏡之明己形而不慕士之明己心人皆欲櫛之理其髮不願善言之理其情是棄重德而採輕功不亦倒乎為衣冠者己乎不能則知越鄉借人以製之至於理身而不知借言以脩其行是處其身輕而於冠重不亦謬乎君子重正言之惠賢於軒璧之贈樂聞其過勝於德義之名故楚莊王輕千乘之國而重申叔一言范獻賤萬畝之田以貴舟人片說季路抱五慎之誡趙盈佩九言之箴以此觀之軒壁之與田邑豈能與善言齊價哉夫桓侯不採越人之說卒成骨髓之疾吳王不聽枚乘之言終受夷滅之禍夫人之將疾者必不甘魚肉之味身之將敗必不納忠諫之言故臨死者謂無良醫之蔽將敗者謂無直諫之臣而不聽善言是耳聾也非其耳之有塞善言不入耳乎是以明者納規於未形採言於患表從善如轉圜遣惡如讎敵正音日聞於耳禍害逾遠於身昔堯設招諫之鼓舜樹誹謗之木湯立司過之士武王置誡慎之鼗以聖哲之神鑒窮機洞微非有毫釐之謬也猶設廣聽之術開嘉言之路豈不貽厥將來表正言之益耶以夫先聖猶能採言於芻蕘奚況布衣而不貴言乎故臣子之於君父則有獻可替否諷諫之文知交之於朋友亦有切磋琢磨相成之義君子若能聽言如響從善如流則身安南山德茂松柏聲振金石名流千載也傷讒第三十二譽者揚善之樞也毀者宣惡之機也揚善生於性美宣惡出於情姤性美以成德為恒情姤以傷人為務故譽以論善即辭以極善為功毀以譽過則言以窮惡為巧何者俗人好奇不奇不用也譽人不增其義則聞者不快於心毀人不益其惡則聽者不蒲於耳代之善人少而惡人多則舉者寂寞而讒者諠譁是以洗垢求㾗吹毛覔瑕揮空成有轉白為黑提輕當重引寸至尺墨子所以悲素絲楊朱所以泣岐路以其變為青黃廻成左右也昔人興讒言於青蠅譬利口於刀劍者以其點素成緇刃勁傷物故有四畏不可不慎鳥之曲喙鈙距者羽類畏之獸之方喙鉤爪者群畏之魚之哆脣鋸齒者鱗族畏之人之利口讒謟者人共畏之讒嫉之人必好聞人惡惡聞人善妒才智之在己前諅富貴之在已上猶喉中有噎吞之思入目上有翳決之願去吞決之情深則萋斐之辭作故揚娥眉者為醜女之所妒行貞潔者為讒邪之所嫉昔直不疑未嘗有兄而讒者謂之盜嫂第五倫三娶孤女而世人謂笞婦翁妐此皆聽虛而責響視空而索影悖情倒理誣罔之甚也以二子之賢非身行之不潔與人有讎也而不免於世謗者豈非獸惡其網人惡其讒耶故讒邪之蔽善人也猶朝日洞明霧甚則不見天沙石至淨流濁則不見地雖有明淨之質而不發明者水霧蔽之也蘭蓀欲茂秋風害之賢哲欲正讒人敗之故讒者知害嫉於他人而不知傷所說之主知傷所說之主而不知還害其身故無極之讒子常蒙謗郄費雙滅讒謟之流弊一至於斯嗚呼世之君子可不慎諸慎隟第三十三過者怨之梯也怨者禍之府也禍之所生必由積怨過之所始多因忽小小過之來出于意表積怨之成在於慮外故其來也不自防其成也不可悔防怨不密而禍害臻焉故登峭坂而不跌墜者慎于大也跨阜垤而好顛蹶者輕于小也苟兢其步雖履嶮能安輕易其足雖夷路亦躓智者識輕小之為害故慎微細之危患每畏輕微懍懍焉若朽索之馭六馬也鴻毳性輕積之沉舟魯縞質薄疊之折軸以毳縞之輕微能敗舟車者積多之所致也故墻之崩隤必因其隟劍之毀折皆由于瑩尺蚓穿堤能漂一邑寸煙泄突致灰千室怨之始也微於隟瑩及其為害大於墻劍禍之所傷甚于邑室將防其萌急於水火夏書曰怨豈在明不見是圖故怨不在大亦不在小熒熒不滅能焚崑山涓涓不絕能成江河怨之所生不可類推禍之所言非可情測或怨大而成小或憾輕而至重深讎不必危而睚眥未可易也譬如風焉披雲飛石捲水蹶木而人血脈不為之傷隟穴之風輕塵不動毛髮不搖及中肌膚以為深疾大不為害小而成患者大風散漫小風激射也故漢祖免貫高之逆魏后曹操泄張繡之讎韓信削少年之辱安國釋田甲之慢此皆遇英達之主寬廓之衿得以深怨而不為讎也魯酒薄而邯鄲圍羊羹偏而宋師敗郈孫以鬭鷄亡身齊侯以笑嬪破國皆以輕蔑細怨忘樹禍端以酒食戲笑之故敗國滅身為天下笑不慎故也伐之闇者皆以小害易微之事以至於大患禍之至也人自生之福之來也人自成之禍與福同門害與利同鄰若非至精莫能分矣是以智慮者禍福之門戶動靜者利害之樞機不可不慎也
