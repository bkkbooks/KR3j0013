body:
  text: 卷第十正賞第五十一賞者所以辨情也評者所以繩理也賞而不正則情亂於實評而不均則理失其真理之失也由於貴古而賤今情之亂也在乎信耳而棄目古今雖殊其迹實同耳目誠異其識則齊識齊而賞異不可以稱正迹同而評殊未得以言評評正而賞翻則情理並亂也由今人之畫鬼魅者易為巧摹犬馬者難為工何者鬼魅質虛而犬馬質露也質虛者可託怪以示奇形露者不可誣罔以是非難以其真而見妙也託怪於無象可假非而為是取範於真形則雖是而疑非昔魯哀公遙慕稷契之賢不覺孔丘之聖齊景公高悕管仲之謀不知晏嬰之智張伯松遠羡仲舒之慱近遺子雲之美以夫子之聖非不光於稷契晏嬰之賢非有減於管仲揚子雲之才非為亞於董仲舒然而弗貴者豈非重古而輕今珍遠而鄙近貴耳而賤目崇名而毀實耶觀俗之論非苟欲以貴彼而賤此飾名而挫實由於美惡混渘真偽難分以度物為情占心而定是非也今以心察錙銖之重則莫之能識懸之權衡則亳釐之重辨矣是以聖人知是非難明輕重難定制為法則揆量物情故權衡誠懸不可欺以輕重繩墨誠陳不可誣以曲直規矩誠設不可罔以方圓故摹法以測物則真偽易辨矣信心而度理則是非難明矣越人臛蛇以饗秦客其之以為鯉也既而知其是蛇攫喉而嘔之上為未知味也趙人有曲者託以伯牙之聲世人競習之後聞其非乃束指而罷此為未知音也宋人得石燕以為美玉銅匣而藏之後知是石因捧匣而棄之此為未識玉也郢人為賦託以靈均舉世而誦之後知其非皆緘口而捐之此為未知文也故以蛇為鯉者唯易牙不失其味以趙曲為雅聲者唯鍾期不溷其音以燕石為美玉者唯猗頓不謬其真以郢賦為麗藻者唯相如不濫其賞昔二人評玉一人曰好一人曰醜久不能辨客曰爾來入吾目中則好醜分矣夫玉有定形而察之不同非好相反瞳睛殊也堂珠黼幌綴以金魄碧流光霞耀爛眩目而醉者眸轉呼為焰火非黼幌狀移目改變也鏡形如杯以照西施鏡縱則面長鏡橫則面廣非西施貌易所照變也海濱居者望鳥如舟望舟如鳧而須舟者不造島射鳧者不向舟知是望遠目亂心惑也山底行者望嶺樹如簪視岫虎如犬而求簪者不上亡犬者不往呼知是望高目亂而心惑也至於觀人論文則以大為小以能為鄙而不知其目亂心惑也與望山海不亦反乎昔者仲尼先飯黍侍者掩口笑子遊揚裘而諺魯參揮指而哂以聖賢之舉錯非有謬也而不免於嗤誚奚況世人未有名稱其容止文華能免於嗤誚者豈不難也以此觀之則正可以為邪美可以稱惡名實顛倒可謂歎息也今述理者貽之知音君子聰達亮於聞前明鑒出於意表不以名實眩惑不為古今易情採其制意之本略其文外之華不沒纖芥之善不掩螢燭之光可謂千載一選也激通第五十二登峭嶺者則欲望遠臨峻谷者必欲窺墟墟墓之間使情哀清廟之中使心敬此處無心而情為之發者地勢使之然也故駛雪多積荒城之隈急風好起沙河之上克己類出甕牖之氓決命必在吞氣之士何者寒荒之地風雪之所積慷慨之懷忠義之所聚是以楩柟鬱蹙以成縟錦之瘤蚌蛤結痾而銜明月之珠鳥淚則能翔青雲之際矢驚則能踰白雪之嶺斯皆仍瘁以成明文之珍因激以致高遠之勢衡飆之激則折木湍波之浦必漂石風之體虛水之性弱而能披堅木轉重石者激勢之所成也故居不隱者思不遠也身不危者其志也蘇秦若有負郭之田必不佩六國之印主父不為親友所蔑必不窺五鼎之食張儀不有堂下之恥必無入秦之志范睢若無廁中之辱不懷復魏之心寧越激而修文卒為周威之師班超憤而習武終建西域之績觀其數賢皆因窘而發志緣厄而顯名故平原五達易行之衢也孤峰九折難陟之徑也從高趣下駑馬之步也騰峭登危飛鼯之足也以險而陟然後為貴以難而升所以為賢古之烈士厄而能通屈而能伸彼皆有才智又遇其時得為世用也惜時第五十三夫停燈於缸先焰非後焰而明者不能見藏山於澤今形非昨形而智者不能知何者火則時時滅山亦時時移夫天回日轉其謝如矢騕裊迅足神馬弗能追也人之短生猶如石火𤈍然以過唯立德貽愛為不朽也昔之君子欲行仁義於天下則與時競馳不吝盈尺之璧而珍分寸之陰故大禹之趨時挂冠而不顧南榮之訪道踵趼而不休仲尼恓恓突不睱黔墨翟遑遑席不及暖皆行其德義拯世危溺立功垂楷延芳百世今人進不知退臭腐榮華剗絶嗜欲被麗絃歌取媚泉石退不能披策樹勳毗贊明時空蝗梁黍枉沒歲華無聞之人歿成一棺之土亦何殊草木自生自死者哉歲之秋也涼風鳴條清露變葉則寒蟬抱樹而長叫吟烈悲酸瑟于落日之際何也哀其時命迫于嚴霜而寄悲於菀柳今日血西峰道業未就鬱聲於窮岫之陰無聞於休明之世已矣夫亦奚能不霑𥘞於將來染意於松煙者哉言菀第五十四忠孝者百行之寶歟忠孝不修雖有他善則猶玉屑盈匣不可琢為圭璋銼絲蒲篋不可織為綺綬雖多亦奚以為也信讓者百行之順也誕伐者百行之悖也信讓乖禮回而成悖誕伐合義翻而成順直躬證父蒼梧讓兄信讓悖也弦高矯命大禹昌言誕伐順也謂牧圉似桀紂艴然而怒比王侯於夷齊怡然而喜仁義所在匹夫為重仁義所去則尊貴為輕事可以必誠理可以情通睇秋月明而知孀婦思聞林風響而見舟人驚陽氣主生物所樂也陰氣主殺物所憾也故春葩含日似笑秋葉泫露如泣夫善交者不以出入易意不以生死移情在終如始在始如終猶日月也故日之出入懼明月之生死同形天無情於生死則不可以情而憾怨故暄然而春榮華者不謝悽然而秋凋零者不憾榮凋有命困遇有期故春蘂雖茂假朝露而抽翠秋葉誠危因微風而飄零萬物居溫則柔入寒則剛故春角可卷夏條可結秋露可凝冬木可折人皆愛少而惡老重榮而輕悴故簪珥英華而焚灰枯朽莫識枯朽生於英華英華歸於枯朽山抱玉故鑿之江懷珠則竭之豹佩文則剝之人含智則嫉之智能知人不能自知神能衛人不能自衛故神龜以智見灼靈蛇以神見爆孰知不智為智不神為神乎妙必假物而物非生妙巧必因器而器非成巧是以羿無弧矢不能中微其中微者非弧矢也倕無斧釿不能善斫其善斫者非斧釿也畫以摹形故先質後文言以寫情故先實後辨無質而文則畫非形也不實而辨則言非情也紅黛飾容欲以為豔而動目者稀揮絃繁弄欲以為悲而驚耳者寡由於質不美也質不美者雖崇飾而不華曲不和者雖響疾而不哀理動於心而見於色情發於衷而形於聲故強歡者雖笑不樂強哭者雖哀不悲耳聞所惡不若無聞目見所惡不如無見故雷震必塞耳掣電必掩目為仁則不利為利則不仁故販粟者欲歲之飢售藥者欲人之疾物各重其所主而桀紂之狗可以吠堯故盜跖之徒賢於盜唔而鄙仲尼運屈而恚天辱至而怨人是以火焚而怨燧人溺井而尤伯益宿不樹惠臨難而施恩本不防萌害成而修慎是以臨渴而穿井方飢而植禾雖疾無所及也公儀嗜魚屈到嗜芰雖非至味人皆甘之與衆同也文王嗜膽會晢嗜棗膽苦棗酸聖賢甘之與衆異也鹿形似馬而迅於馬豺形似犬而健於犬國有千金之馬而無千金之鹿家有千金之犬而無千金之豺以犬馬有用而豺鹿無用也九流第五十五儒者晏嬰子思孟軻荀卿之類也順陰陽之性明教化之本遊心於六藝留情於五常厚葬文服重樂有命祖述堯舜憲章文武宗師仲尼以尊敬其道然而薄者流廣文繁難可窮究也道者鬻熊老聃關尹莊周之類也以空虛為本清淨為心謙挹為德卑弱為行居無為之事行不言之教裁成宇宙不見其迹亭毒萬物不有其功然而薄者全棄忠孝杜絶仁義專任清虛欲以為治也陰陽者子韋鄒衍桑丘南父之類也敬順昊天曆象日月星辰敬受民時範三光之度隨四時之運知五行之性通八風之氣以厚生民以為政治然而薄者則拘於禁忌溺於術數也名者宋鈃尹文惠施公孫捷之類也其道主名名不正則言不順故定尊卑正名分愛平尚儉禁攻寢兵故作華山之冠以表均平之製則寬宥之説以示區分然而薄者捐本就末分扸明辨苟折華辭也法者慎到李悝韓非商鞅之類也其術在於明罰討陳整法誘善懲惡俾順度以為治本然而薄者削仁廢義專任刑法風俗刻薄嚴而少恩也墨者尹佚墨翟禽滑胡非之類也儉嗇謙愛尚賢右鬼非命薄葬無服不怒俳鬭然而薄者其道大觳儉而難遵也縱橫者闞子龐愋蘇秦張儀之類也其術本於行仁譯二國之情弭戰爭之患受命不受辭因事而制權安危扶傾轉禍就福然而薄者則苟尚華詐而棄忠信也雜者孔甲尉繚尸佼淮南之類也明陰陽通道德兼儒墨合名法苞縱橫納農植觸類取與不拘一緒然而薄者則蕪穢蔓衍無所係心也農者神農野老宰氏范勝之類也其術在於務農廣為墾闢播植百穀國有盈儲家有蓄積倉廩充實則禮義生焉然而薄者若使王侯與庶人並耕於野無尊卑之別失君臣之序也觀此九家之學雖有深淺辭有詳略偕僪形反流分乖隔然皆同其妙理俱會治道迹雖有殊歸趣無異猶五行相滅亦還相生四氣相反而共成歲淄澠殊源同歸於海宮商異聲俱會於樂夷惠同操齊蹤為賢二子殊行等迹為仁道者玄化為本儒者德教為宗九流之中二化為最夫道以無為化世儒以六藝濟俗無為以清虛為心六藝以禮教為訓若以教行於大同則邪偽萌生使無為化於成康則氛亂競起何者澆淳時異則風化應殊古今乖舛則政教宣隔以此觀之儒教雖非得真之説然茲教可以導物道家雖為達情之論而違禮復不可以救弊今治世之賢宜以禮教為先嘉遁之士應以無為是務則操業俱遂而身名兩全也
