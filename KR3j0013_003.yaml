body:
  text: 卷第三愛民第十二天生萬民而立之君君則民之天也天之養物以治陰陽為本君之化民以政教為務故寒暑不時則疾疫風雨不節則歲飢刑罰者民之寒暑也教令者民之風雨也刑罰不時則民傷教俴不節則俗弊故水濁無棹尾之魚土確無威蕤之木政煩無逸樂之民政之於人由琴瑟也大絃急則小絃絶大絃閼矣夫足寒傷心民勞傷國足溫而心平人佚而國寧是故善為理者必以仁愛為本不以苛酷為先寬宥刑罰以全人命省徹徭役以休民力輕約賦斂不匱人財不奪農時以足民用則家給國富而太平可致也人之於君猶子之於父母也未有父母富而子貧父母貧而子富也故人饒足者非獨人之足亦國之足也渴乏者非獨人之渴乏亦國之渴乏也故有若曰百姓足君孰與不足百姓不足君孰與足此之謂也先王之治上順天時下養萬物草木昆蟲不失其所獺未祭魚不施網罟豺未祭獸不修田獵鷹隼未擊不張罻羅霜露未霑不伐草木草木有生而無識鳥獸有識而無知猶施仁愛以及之奚況生人而不愛之乎故君者其仁如春其澤如雨德潤萬物則人為之死矣昔太王居邠而人隨之仁愛有餘也夙沙之君而人背之仁愛不足也仁愛附人堅於金石金石可銷而人不可離故君者壤也人者卉木也未聞壤肥而卉木不茂君仁而萬人不盛矣從化第十三君以民為體民以君為心心好之身必安之君好之民必從之未見心好而身不從君欲而民不隨也人之從君如草之從風水之從器故君之德風之與器也人之情草之與水也草之戴風風鶩東則東靡風鶩西則西靡是隨風之東西也水之在器器方則水方器圓則水圓是隨器之方圓也下之事上從其所行猶影之隨形響之應聲言不虛也上所好物下必有甚詩云誘人孔易言從上也昔齊桓公好衣紫闔境盡被異綵晉文公不好服美群臣皆衣牂羊魯哀公好儒服舉國皆著儒衣趙武靈王好鵕𪇘國人咸冠鸃冠紫非正色牂非美毳儒非俗服鵕非冠飭而競之者隨君匠好也楚靈王好細腰臣妾為之約食餓死者多越王句踐好勇而揖鬭川蛙國人為之輕命兵死者衆命者人之所重死者人之所惡今輕其所重重其所惡者何也從君所好也堯舜之人可比屋而封桀紂之人可接屋而誅非堯舜之民性盡仁義而桀紂之人生輒軒邪而善惡性殊者染化故也是以明君慎其所好以正時俗樹之風聲以流來世或者以為上化而下不必隨君好而人未必同也故唐堯之世而四凶縱殷紂之時而三仁貞漢文節儉而人庶奢齊景奢而晏嬰儉此未達之辭也何者冬之德陰而有寒炎蕭丘夏之德陽而有霜霰以天地之德由不能一於陰陽況其賢聖豈能一於萬民哉故權衡雖正不能無毫氂之差鈞石雖平不能無抄撮之較從君之譬以多言之唐堯居上天下皆治而四凶獨亂猶曰堯治治者多也殷紂在上天下皆亂而三仁獨治猶曰紂亂亂者衆也漢文節儉而人有奢猶曰世儉儉者多也齊景太奢而晏嬰躬儉猶曰國奢奢者衆也水性宜冷而有華陽溫泉猶曰水冷冷者多也火性宜熱而有蕭丘寒炎猶曰火熱熱者多也迅風揚波高下相臨山隆谷窪差以尋常較而望之猶曰水平舉大體也故世之論事皆取其多者以為之節今觀言者當顧言外之旨不得拘文以害義也法術第十四法術者人主之所執為治之樞也術藏於內隨務應變法設於外適時御人人用其道而不知其數者術也懸教設令以示人者法也人主以術化世猶天以氣變萬物氣變萬物而不見其象以術化人而不見其形故天以氣為靈主以術為神術以神隱成妙法以明斷為工淳風一澆則人有爭心情為既動則立法以撿之建國君人者雖能善政未有棄法而成治也故神農不施刑罰而人善為政者不可廢法而治人舜執干戚而服有苗征伐者不可釋甲而制寇立法者譬如善御察馬之力揣途之數齊其銜轡以從其勢故能登坂赴險無覆軼之敗乘危涉遠無越之患君猶御也法猶轡也人猶馬也馬猶也理猶執轡也執轡者欲馬之遵也明法者欲人治也轡不均齊馬失也法不適時人乖理也是以明主務循其法因時制宜苟利於人不必法古必害於事不丁循舊夏商之衰不變法而亡三代之興不相襲而王堯舜異道而德蓋天下湯武殊治而名施後代由此觀之法宜變動非一代也今法者則溺於古律儒者則拘於舊禮而不識情移法宜變改也此可與守法而施教不可與論法而立教故智者作法愚者制焉賢者更禮不肖者拘焉拘禮之人不足以言事制法之士不足以論理若握一世之法以傳百世之人由以一衣擬寒暑一藥治痤敧也若載一時之禮以訓無窮之俗是刻舟而求劍守株而待兔故制法者為理之所由而非所以為治也禮者成化之所宗而非所以成化也成化之宗在於隨時為治之本在於因世未有不因世而欲治不隨時而成化以斯治政未為衷也賞罰第十五治民御下莫正於法立法施教莫大於賞罰賞罰者國之利器而制人之柄也故天以晷數成歲國以法教為才晷運於天則時成於地法動於上則治成於人晷之運也先春後秋法之動也先賞後罰是以溫風發春所以動萌華也寒露降秋所以殞茂葉也明賞有德所以勸善人也顯罰有過所以禁下姦也善賞者因民所喜以勸善善罰者因民所惡以禁姦故賞少而善勸刑薄而姦息賞一人而天下喜之罰一人而天下畏之用能教挾而治廣用寡而功衆也昔王良之善御也識馬之飢飽規矩徐疾之節故鞭策不載而千里可期然不可以無鞭策者以馬之有佚也聖人之為治也以爵賞勸善以仁化愛民故刑罰不用太平可致然而不可廢刑罰者以民之有縱也是以賞雖勸善不可無罰罰雖禁惡不可無賞賞平罰當則理道立矣故君者賞罰之所歸誘人以趣善也其利重矣其威大矣空懸小利足以勸善虛設輕威可以懲姦矧復張厚賞以施下操大威以臨民哉故一賞不可不信也一罰不可不明也賞而不要雖賞不勸罰而不明雖刑不禁不勸不禁則善惡失理是以明主一賞善罰惡非為己也以為國也適於己而無功於國者不加賞焉逆於己而有勞於國者不施罰焉罰必施於有過賞必加於有功苟能賞占而罰明則萬人從之若舟之循川車之遵路亦奚向而不濟何行而弗臻矣審名第十六言以繹理理為言本名以訂實實為名源有理無言則理不可明有實無名則實不可辨理由言明而言非理也實由名辨而名非實也今信言以棄理實非得理者也信名而略實非得實者也故明者課言以尋理不遺理而著言執名以責實不棄實而存名然則言理兼通而名實俱正世人傳言皆以小成大以非為是傳彌廣而理逾乖名彌假而實逾反則回犬似人轉白成黑矣今指犬似人轉白成黑則不類矣專以類推以此象彼謂大似玃玃似狙狙似人則犬似人矣謂白似緗緗似黃黃似朱朱似紫紫似紺紺似黑則白成黑矣黃軒四面非有八目夔之一足必有獨脛周人玉璞其實死鼠楚之鳳凰乃是山雞愚谷智叟而像頑稱黃公美女乃得醜名魯人縫掖實非儒行東郭吹竽而不知音四面一足本非真實玉璞鳳凰不是定名魯人東郭空濫美稱愚谷黃公橫受惡名由此觀之傳聞喪真翻轉名實美惡無定稱賢愚無正目俗之弊者不察名實虛傳説者即似定真聞野丈人謂之田父河上姹女謂之婦人堯漿禹糧龍肝牛膝謂之為肉掘井得人言自土而出三豕渡河云彘行水上凡斯之類不可勝言故狐狸二獸因其名便合而為一蛩蛩巨虛其實一獸因其詞煩分而為二斯雖成其名而不知敗其實弗審其詞而不察其形是以古人必慎傳名近審其詞遠取諸理不使名害於實實隱於名故名無所容其偽實無所蔽其真此之謂正名也鄙名第十七名者命之形也言者命之名也刑有巧掘名有好醜言有善惡名言之善則悅於人心名言之惡則忮於人耳是以古人制邑名子必依善名名之不善害於實矣昔畢萬以盈大會福晉讎以怨偶逢禍然盈大者不必盡吉怨偶者不必皆凶而人懷愛憎之意者以其名有善惡也今野人晝見蟢子者以為有喜樂之瑞夜夢見雀者以為有爵位之象然見蟢者未必有喜夢雀者未必彈冠而人悅之者以其名利人也水名盜泉尼父不漱邑名朝歌顏淵不舍里名勝母曾子還軔亭名柏人漢後夜遁何者以其名害義也以蟢雀之徵無益於人名苟近善而世俗愛之邑泉之大生人所庇名必傷義聖賢惡之由此而言則善惡之義在於名也昔有貧人命其狗曰富命其子曰樂方祭而狗入於室叱之曰富出祝曰不祥家果有禍其子後死哭之曰樂而不自悲也莊公有人字其長子曰盜次子曰驅盜持衣出耨其母呼之曰盜吏因縳之其母呼驅驅喻吏遽而聲不轉但言驅驅吏因支之盜幾至於殪立名不善而受其弊審名之宜豈不信哉
