body:
  text: 卷第二辨樂第七樂者天地之聲中和之紀人情之所不能免也人心喜則笑笑則樂樂則口欲歌之手欲鼓之足欲舞之歌之舞之容發於聲音形發於動靜而入於至道音聲動靜性術之變盡於此矣故人不能無樂樂則不能無形形則不能無道道則不能無亂先王惡其亂也故制雅樂以道之使其聲足樂而不淫使其音調倫而不詭使其曲繁省而廉均是以感人之善惡不使放心邪氣是先王立樂之情也五帝殊時不相沿樂三王異世不相襲禮各像勳德應時之變故黃帝樂曰雲門顓頊曰五莖嚳曰六英堯曰咸池舜曰簫韶禹曰大夏湯曰大濩武曰大武此八樂之所以異名也先王聞五聲播八音非苟欲愈心蒲耳聽其鏗鏘而已將順天地之體成萬物之性協律呂之情和陰陽之氣調八風之韻通九歌之分奏之圜丘則神明降用之方澤則幽祗升擊拊球石則百獸率舞樂終九成則瑞禽翔上能感動天地下則移風易俗此德音之音雅樂之情盛德之樂也明王既泯風俗凌遲雅樂殘廢而溺音競興故夏甲作破斧之歌始為東音殷辛作靡靡之樂始為北聲鄭衛之俗好淫故有溱洧桑中之曲楚越之俗好勇則有赴湯蹈火之歌各咏其所好歌其所欲作之者哀聽之者泣由心之所感則形於聲聲之所感必流於心故哀樂之心感則燋殺嘽緩之聲應濮上之音作則淫泆邪放之志生故延年造傾城之歌漢武思靡嫚之色雍門作松柏之聲齊泯願未寒之服荊軻入秦宋意擊筑歌於易水之上聞者瞋目髮直穿冠趙王遷於房陵心懷故鄉作山木之謳聽者鳴咽泣涕流連此皆淫泆悽愴憤厲哀思之聲非理性和情德音之樂也恆帝聽楚琴慷慨歎息悲酸傷心曰善哉為琴若此豈非樂乎夫樂者聲樂而心和所以非為樂也今則聲哀而心悲灑淚而歔欷是以悲為樂也若以悲為樂亦何樂之有哉今悲思之聲施於管絃聽音者不淫則悲淫則亂男女之辨悲則感怨思之聲豈所謂樂哉故奸聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉樂不和順則氣有蓄滯氣有蓄滯則有悖逆詐僞之心淫泆妄作之事是以奸聲亂色不留聰明淫樂慝禮不接心術使人心和而不亂者雅樂之情也故為詩頌以宣其志鍾鼓以節其耳羽旄以制其目聽之者不傾視之者不邪耳目不傾不邪則邪音不入邪音不入則情性內和情性內和然後乃為樂也履信第八信者行之基行者人之本人非行無以成行非信無以立故信之行於人譬濟之須舟也信之於行猶舟之待戢也將涉大川非舟何以濟之欲泛方舟非戢何以行之今人雖欲為善而不知立行猶無舟而濟川也雖欲立行而不知立信猶無戢而行舟也是適郢土而首冥山背道愈遠矣自古皆有死人非信不立故豚魚著信之所及也允哉斯言非信不成齊桓不背曹劌之盟晉文不棄伐原之誓吳起不虧移轅之賞魏侯不乖虞人之期用能德光於宇宙名流於古今不朽者也故春之得風風不信則花萼不茂花萼不茂則發生之德廢夏之得炎炎不信則草木不長草木不長則長贏之德廢秋之得雨雨不信則百穀不實百穀不實則收成之德廢冬之得寒寒不信則水土不堅水土不堅則安靜之德廢以天地之靈氣不信四時猶廢而況於人乎昔齊攻魯求其岑鼎魯侯僞獻他鼎而請盟焉齊侯不信使柳季云是則請受之魯使柳季柳季曰君以鼎為國信者亦臣之國今欲破臣之國全君之國臣所難也乃獻岑鼎小邾射以邑奔魯魯使季路要我君無盟矣乃使子路辭焉季孫謂之曰千乘之國不信其盟而信子之一言子何辱焉子路曰彼不臣而濟其言是不義也由不能矣夫柳季季路魯之匹夫立信於衡門而聲馳於天下故齊邾不信千乘之盟而重二子之言信之為德豈不大哉秦孝公使商鞅攻魏魏遣公子昂逆而拒之鞅謂昂曰昔鞅與公子善今俱為兩國將不忍攻願一飲宴休二師公子許焉遂與之會鞅伏甲虜之擊破魏軍及惠王即位疑其行詐遂車裂於市夫商鞅秦之貴臣名重於海內貪詐僞之小功失誠信之大義一為不信終身尤卒至屠滅為天下笑無信之弊豈不重乎故言必如言信之符也同言而信信在言前同教而行誠在言外君子知誠信之為貴必忱信而行指麾動靜不失其符以施教則立以蒞事則正以懷遠則附以賞罰則明由此而言信之為行其德大矣思順第九七緯順度以光天象五性順理以成人行行象為美美于順也夫人為失失在于逆故七緯逆則天象變五性逆則人道敗變而不生災敗而不傷行者未之有也山海爭水水必歸海非海求之其勢順也蹇利西南就土順也不利東北登山逆也是以去濕就燥火之勢也違高從下水之性也今導泉向澗則為易下之流激波陵山必成難升之勢水之無情猶知違逆趣順矧人心乎故忠孝仁義德之順也悖慠無禮德之逆也順者福之門逆者禍之府由是觀之逆性之難順性之易斷可識矣今使孟說引牛之尾尾斷臏裂不行十步若環棄之條以貫其鼻縻以尋綯被髮童子騎而策之風干廣澤恣情所趣何者十步之行非達於廣澤被髮之童非勇於孟說然而近不及遠強不如弱者逆之與順也司馬蒯瞶天下之攻劍者也令提劍鋒而悼劍觚必刎其指而不能以陷腐木而況金甲乎若提其觚而掉其鋒雖則凡夫可以陸斬犀象水截蚊龍矣順理而行若執劍觚逆情而動如執劍鋒欲無傷乎后稷善橎植不能使禾稼冬生逆天時也禹善治水鑿穴川不能回水西流逆地勢也人雖才藝卓絶不能悖理成行逆人道也故循理處情雖愚蠢可以立名反道為務雖賢哲猶有禍害君子如能忠孝仁義履信思順自天祐之吉無不利也慎獨第十善者行之總不可斯須離可離非善也人之須善猶首之須冠足之待履首不加冠是越類也行不躡履是夷民也今處顯而修善在隱而為非是漬旦冠履而昏夜倮跣也荃蓀孤植不以巖隱而歇其芳石泉潛流不以澗幽而不清人在暗密豈以隱翳而回操是以戒慎目所不覩恐懼耳所不聞居室如見賓入虛如有人故蘧瑗不以昏行變節顏回不以夜浴改容勾踐拘於石室君臣之禮不替冀缺耕於埛野夫婦之敬不虧斯皆慎乎隱微枕善而居不以視之不見而移其心聽之不聞而變其情也謂天蓋高而聽甚卑謂日蓋遠而照甚近謂神蓋幽而察甚明詩云相在爾室尚不愧於屋漏無曰不顯莫豫云覯暗昧之事未有幽而不顯昏惑之行無有隱而不彰修操於明行悖幽以人不知若人不知則鬼神知之鬼神不知知之而云不知是盜鐘掩耳之智也孔徒晨起為善孜孜東平居室以善為樂故身恆居善則內無憂慮外無畏懼獨立不慚影獨寢不愧衾上可以接神明下可以固人倫德被幽明慶祥臻矣貴農第十一衣食者民之本也民者國之本也民恃衣食猶魚之須水國之恃民如人之倚足魚無水則不可以生人失足必不可以步國失民亦不可以治先王知其如此而給民衣食故農祥旦正晨集娵訾陽氣憤盈土木脈發天子親耕於東郊后妃躬桑於北郊國非無良農也而王者親耕世非無蠶妾也而后妃躬棄上可以供宗廟下可以勸兆民神農之法曰丈夫丁壯而不耕天下有受其饑者婦人當年而不織天下有受其寒者故天子親耕后妃親織以為天下先是以其耕不強者無以養其生其織不力者無以蓋其形衣食饒足奸邪不生安樂無事天下和平智者無所施其策勇者無以行其威故衣食為民之本而工巧為其末也是以雕文刻鏤傷於農事錦績綦組害於女工農事傷則饑之本也女工害則寒之源也饑寒並至而欲禁人為盜是揚火而欲無炎撓水而望其靜不可得也衣食足知榮辱倉廩實知禮節故建國者必務田蠶之實棄美麗之華以穀帛為珍寶比珠玉於糞土何者珠玉止於虛玩而穀帛有實用也假使天下瓦礫悉化為和璞砂石皆變為隋珠如值水旱之歲瓊粒之年則璧不可以禦寒珠未可以充饑也雖有奪日之鑑代月之光歸於無用也何異畫為西施美而不可悅刻作桃李似而不可食也衣之與食唯生人之所由其最急者食為本也霜雪巖巖苫蓋不可以代裘室如懸磬草木不可以當糧故先王制國有九年之儲可以備非常救災厄也堯湯之時有十年之蓄及遭九年洪水七載大旱不聞饑饉相望捐棄溝壑者蓄積多故也穀之所以不積者在於游食者多而農人少故也夫螟螣秋生而秋死一時為災而數年乏食今一人耕而百人食之其為螟螣亦以甚矣是以先王敬授民時勸課農桑省游食之人滅徭役之費則倉廩充實頌聲作矣雖有戎馬之興水旱之沴國未嘗有憂民終為無害也
