body:
  text: 卷第七誡盈第三十四四時之序節滿即謝五行之性功成必退故陽極而降陰極而昇日中則昊月盈則虧此天之常道也勢積則損財聚則散年盛返衰樂極還悲此人之恒情也昔仲尼觀欹器而革容鑒損益而歎息此察象而識類覩霜而知冰也夫知進而不知退則踐盈滿之危處存而不忘危必履太山之安故雷在天上曰大壯山在地中曰謙謙則裒多益寡壯則非禮勿履處壯而能用禮居謙而能益寡降高以就卑抑強而同弱未有謙尊而不光驕盈而不斃者也聖人知盛滿之難持每居德而謙沖雖聰明睿智而志逾下富貴廣大而心逾降勛蓋天下而情逾抑不以德厚而矜物不以身尊而驕民故楚莊王功立而心懼晉文公戰勝而色憂非憎榮而惡勝乃功大而心小居安而念危也夏禹一饋而七起周公一沐而三握食不遑飽沐不及晞非耐饑而樂勞是能心急於接士處于謙光也易曰以貴下賤大得民也是以君子高而能卑富而能儉貴而能賤智而能愚勇而能怯辯而能訥慱而能淺明而呢能闇是謂損而不窮也明謙第三十五天道下濟而光明江湖善下而為王故山在地中成謙王侯以孤寡為損謙則榮而逾高損則顯而彌貴高必以下為基貴則以賤為本在貴而忘貴故能以貴下民處高而遺高故能以高就卑是以大壯往則復天地之謙也極昇必降陰陽之謙也滿終則虧日月之謙也道盈體中聖人之謙也易稱謙尊而彌光老子云不伐故有功謙者在於降已以高下卑以聖從鄙不伐在於有功不矜在於有德不言歸於沖退謙挹之流也好盈自賢矜功伐善者俗之恒情聖人之惡也必矜其功雖賞之而稱勞情猶不足苟伐其善雖與之賞必多怨其少則慊望之情生躁競之色見矜伐之路開患難之釁作矣君子則不然在榮以挹損為基有功而不矜有善而不伐遺其功而功常存忘其善而善自全情恒忘善故能以善下物情恒存善故能以善勝人是以情存功善非心謙也口虛托謙豈非矯乎以善勝物心遺功善非矜伐也口及其善豈非實乎故心存功善非心謙也口雖不言未免矜伐心捨功善口雖明言無傷於廉故夏禹昌言明稱伐功啟繇陳謨云說我惠豈其矜功而存惠哉夫言善非伐而伐善者每稱其能言惠非矜而矜惠者常存其惠聖人知人情尚賢而好伐故發言裁典多由謙退所以棄其驕姱競垂世則也大質第三十六火之性也大寒慘悽凝冰裂地而炎氣不為之衰大熱煊赫燋金爍石而炎氣不為之熾者何也有自然之質而寒暑不能移也故丹可磨而不可奪其色蘭可燔而不可滅其馨玉可碎而不可改其白金可銷而不可易其剛各抱自然之性非可強變者也士有忠義之性懷真直之操不移之質亦如茲者也是以生苟背道不以為利死必合義不足為害故不趨利而逃害不忻生而憾死不可以威脇而變其操不可以利誘而易其心昔子閶之劫也擬之白刃而其心不傾晏嬰之盟也鉤以曲戟而其志不廻不可以利害趨其情矣夫士有忠義之行踐繩墨之節其於平日乃無異於眾人及至處患蹈難而志氣貞剛然後知其殊也譬如鍾山之玉寒嶺之松比瓀珉梓柳無殊也及其燒以爐炭三日而色潤不改處於積冰終歲而枝葉不凋然後知其異於他玉眾木也故袒暴虎而後勇氣發焉超勝絕坂而後迅捷露焉手提萬鈞而後多力見焉處難踐患而後貞勇出焉不用干將悉心以知其銳也不引烏號奚以知其勁也勁銳之質較然易見猶因人獲顯況乃志行難覩曷得不因事而後明虖辯施第三十七夫山皋非為鳥植林林茂而鳥自栖之江湖非為魚鑿潭潭深而魚自歸之處世非為人積財財積而人自依之非其所招勢使然也懷璧之子未必能惠而人競親者有惠人之資也被褐之士性能輕財而皆踈之者無惠人之資也令富而儉𠫤猶見親敬貧而仁施必見踈慢非行之失彼情變也策駟登山不得直轡而行泛舟入海不得安身而坐何者山路迂迴海水淪沒行者欲直而路曲之坐者欲安而水蕩之仁者欲施而貧遏之富而賑物德不為難貧而儉嗇行非為過天之道損有餘人之情矜不足也崑山之下以玉抵烏彭蠡之濱以魚食犬而人不愛者非性輕財所豐故也挈缾丏水執萑求火而人不恡非性好施有餘故也口非匏瓜不得不食身非木石不得不衣食不滿腹豈得輟口而惠人衣不蔽形何得露體而施物非性儉恡不足故也饑饉之春不賑朋戚多稔之秋饗及四憐不賑朋戚人之惡惠及四憐人之善蓋善惡之行出於性情而繫于饑穰也以此觀之太豐則恩情生窶乏則仁惠廢也相馬者失在於瘦求千里之步虧也相人者失在於貧求恩惠之迹缺也輕財之士世非少也然而不見者貧掩之也德行未著而稱我能猶足不能行而賣躄藥望人信之實為難矣和性第三十八夫歐治鑄劍太剛則折太柔則卷欲劍無折必加其錫欲劍無卷必加其金何者金性剛而錫質柔剛柔均平則為善矣良工塗漆緩則難晞漆急則弗牢均其緩急使之調和則為美也人之含性有似於茲剛者傷於嚴猛柔者失於軟懦緩者悔於後機急者敗於懁促故鑄劍者使金不至折錫不及卷製器者使緩而能晞急而能牢理性者使剛而不猛柔而不懦緩而不後機急而不懁促故能劍器兼善而性氣淳和也昔徐偃王軟而國滅齊簡公懦而身亡此性太柔之失也晉陽處父以純剛取害鄭子陽以嚴猛致斃此性太剛之過也楚子西寬而招敗邾莊公懁而自禍此性褊急之災也西門豹性急佩韋皮以自緩董安于性緩帶絲絃以自急彼各能以一物所長攻其所短故陰陽調天地和剛柔均人事和也陰陽不和則水旱失節剛柔不均則強懦乖政水旱失節則歲敗強弱乖政則身亡是以智者寬而慄嚴而溫柔而毅猛而仁剛而濟其柔柔抑其強強弱相參緩急相弼以斯善性未聞誤物而有悔恡者也殊好第三十九累榭洞房珠簾玉扆人之所悅也鳥入而憂聳石巉巖輪菌糺結猨狖之所便也人上而慄五六咸池簫韶人之所樂也獸聞而振懸瀨碧潭瀾波洶湧魚龍之所安也人入而畏飛鼯甘煙走貊美鐵䲰日嗜虵人好蒭豢鳥獸與人受性既殊形質亦異所居隔絕嗜好不同未足怪也人之與獸共稟二儀之氣俱抱五常之性雖賢愚異情善惡殊行至於目見日月耳聞雷霆近火覺熱履水知寒此之麤識未宜有殊也聲色芳味各有正性善惡之分皎然自露不可以皂為白以羽為角以苦為甘以臭為香然而嗜好有殊絕者則偏其反矣非可以類推弗得以情測顛倒好醜良可怪也赬顏玉理眄視巧笑眾目之所悅也軒皇愛嫫母之醜貌不易落英之麗容陳侯悅敦洽之醜狀弗賀陽文之婉姿炮羔煎鴻臛蠵臑熊眾口之所嗛文王嗜菖蒲之葅不易龍肝之味陽春白雪噭楚採菱眾耳之所樂也而漢順聽山鳥之音云勝絲竹之響魏文侯好搥鑿之聲不貴金石之和鬱金玄憺春蘭秋蕙眾鼻之所芳也海人悅至臭之夫不愛芬馨之氣若斯人者皆性有所偏也執其所好而與眾相反則倒白為黑變苦成甘移角成羽佩蕕蒜當薰美醜無定形愛憎無正分也
