body:
  text: 卷第五通塞第二十三命有否泰遇有屈伸否與泰相翻屈與伸殊貫邀泰遇伸不盡睿智遭否會屈不專膚蔽何者否泰由命屈伸在遇也命至於屈才通理壅遇及於伸才壅迹通通之來也非其力所招壅之至也非其智所回勢苟就壅則口目雙掩遇必屬通則聲眺俱明故處冗犬呼聲鬱數仞順風長叫響通百里入井望天不過圓蓋登峰眺目極於煙際向在井冗之時聲非卒嗄目非暴昧而聞見局者其勢雍也及其乘風蹈峰聲非孟賁目非離婁而響徹眺遠者其勢通也買臣忍飢而行歌王章苦寒而坐泣蘇秦握錐而憤悶班超執筆而慷慨當彼四子勢屈之時容色黧黑神情沮忸言為瓦礫行成狂狷髮露心憂影銷貌悴引歎而雷轉噴氣則雲湧如騏驥之伏於鹽車玄猿之束於籠圈非無千里之駃萬仞之揵然而不異羸鈍者無所肆其巧也何異處冗而望聲徹入井而欲睇慱哉及其勢伸志得或佩錦而還鄉或聲玉於廊廟或合縱於六國之內或懸旌於崑崙之外當斯之時也容彩光焲神氣開發言成金玉行為世則乘肥衣輕怡然自得漂若輕鴟之泛長波沛若吞舟之揚大壑何異順風而縱聲登峰而長曬人猶是也而昔如彼今如此者非謂昔愚而今賢故醜而新美壅之與通也水之性清動壅以堤則波紐而氣腐決之使通循勢而行從澗而轉雖有朽骸爛卉不能污也非水之性異通之與壅也人之通猶水之通也德如寒泉假有沙塵弗能污也以是觀之通塞之路與榮悴之容相去遠矣遇不遇第二十四賢有常質遇有常分賢不賢性也遇不遇命也性見於人故賢愚可定命在於天則否泰難期命運應遇危不必禍遇不必窮命運不遇安不必福賢不必達故患齊而死生殊德同而榮辱異者遇不遇也春日麗天而隱者不照秋霜被地而蔽者不傷遇不遇也昔韓昭侯醉臥而寒典官加之衣覺而問之知典官有愛於已也以越職之故而加誅焉衛之驂乘見御者之非從後呼車有救危之意不蒙其罪加之以衣恐主之寒呼車憂君之危忠愛之情是同越職之愆亦等典官獲罪呼車見德遇不遇也鴟墮腐鼠非虞氏之慢鈃冰沃地非射姑之穢事出慮外固非其罪而俠客大怒虞氏見滅邾君大怒而射姑獲免遇不遇也齊之華士栖志丘壑而太公誅之魏之干木遁代幽居而文侯敬之太公之賢非有減於文侯干木之德非有逾於華士而或榮或戮者遇不遇也董仲舒智德冠代位僅過士田千秋無他殊操以一言取相同遇明主而貴賤懸隔者遇不遇也莊薑適衛美而無寵宿瘤適齊醜而蒙幸遇不遇命也賢不賢性也怨不肖者不通性也傷不遇者不知命也如能臨難而不懾貧賤而不憂可為達命者矣命相第二十五命者生之本也相者助命而成者也命則有命不形於形相則有相而形於形有命必有相有相必有命同稟於天相須而成也人之命相賢愚貴賤修短吉凶制氣結胎受生之時其真妙者或感五帝三光或應龍迹氣夢降及凡庶亦稟天命皆屬星辰其值吉宿則吉值凶宿則凶受氣之始相命既定即鬼神不能移改而聖智不能回也華胥履大人之迹而生伏羲女蝸感瑤光貫日而生顓頊慶都與赤龍合而生唐堯握登見大虹而生虞舜修紀見洞流星而生夏禹夫都見白氣貫月而生殷湯太妊夢見長人而生文王顏徵感黑帝而生孔子劉媼感赤龍而生漢祖微子感牽牛星顏淵感中台星張良感狐星樊噲感狼星老子感火星若此之類皆聖賢受天瑞相而生者也相者或見肌骨或見聲色賢愚貴賤修短吉凶皆有表診故五嶽崔嵬有峻極之勢四瀆皎潔有川流之形五色鬱然有雲霞之觀五聲鏗然有鍾磬之音善觀察者猶風胡之別刃孫陽之相馬覽其機妙不亦難乎伏羲日角黃帝龍顏帝嚳戴肩顓頊骿骭堯眉八采舜目重瞳禹耳三漏湯肩二肘文王四乳武王𪘀齒孔子返宇顏回重瞳皋繇鳥喙若此之類皆聖賢受天殊相而生者也舜目重瞳是至明之相而項羽王莽亦目重瞳子越王勾踐長項烏喙非善終之象而夏禹亦長頸烏喙王莽之重瞳譬駑馬有驥之一毛而不可謂之驥也句踐長頸鳥喙猶蛇有龍之一鱗而不可謂之龍也爰及衆庶皆有診相故穀子豐下叔興知其有後衛青方顙黥徒明其富貴亞夫縱理許負見其餓死羊鮒聲豺叔姬鑒其滅族命相吉凶懸之於天命當貧賤雖富貴猶有禍患命當富貴雖欲殺之猶不能害夏孔甲畋於箕山大風晦暝入于人家主人方乳或占之曰後來而産是子不勝終必有殃孔甲取之曰苟以為余子誰敢殃之子長折薪斧斬其左足遂為大閽孔甲曰嗚呼有疾命矣夫漢文以夢而寵鄧通相者占通當貧餓死帝曰能富在我何謂貧乎與之銅山專得冶鑄後假衣食寄死人家子文之生妘子棄之虎乃乳之遂收養焉卒為楚相褒離國王侍婢有娠王欲殺之婢曰氣從天來故我有娠及子之産捐豬圈中豬以氣噓之棄馬櫪中馬復噓之故得不死卒為夫餘之王故善惡之命若從天墮若從地出不得以理數推非可以智力要今人不知命之有限而亡覬於分貧命在於貧賤而穿鑿求富貴命在於短折而臨危求長壽皆惑之甚者也妄瑕第二十六大道混然無形寂然無聲視之不見聽之不聞非可以影響求不得以毀譽稱也降此以往則事不雙美名不並盛矣雖天地之大三光之明聖賢之智猶未免乎訾也故天有拆之象地有裂之形日月有薄蝕之變五星有悖彗之妖堯有不慈之誹舜有卑父之謗湯有放君之稱武有殺主之譏齊桓有貪淫之目晉文有不臣之聲伊尹有誣君之迹管仲有愆上之名以夫二儀七耀之聖不能無虧沴堯舜湯武之聖不能免於嫌謗桓文伊管之賢不能無纖瑕之過由此觀之宇宙庸流奚能自免於怨謗而無悔吝耶是以荊岫之玉必含纖瑕驪龍之珠亦有微類然馳光於千里飛價於侯王者以小惡不足以傷其大美者也今志人之細短忘人之所長以此招賢是書空而尋迹披水而覓路不可得也定國之臣亦有細短人主所以不棄之者不以小妨大也以小掩大非求士之謂也伊尹夏之庖廚傅説殷之胥靡百里奚虞之亡虜段干木魏之大駔此四子者非不賢也而其迹不免污也名不兩盛事不俱美昔魏文侯問於李克曰吳起何如人也克對曰起貪而好色然其善用兵司馬穰苴不能過也乃以為將拔秦五城北滅燕趙蓋起之力也魏無知薦陳平於漢王或人讒之曰平雖美丈夫如冠玉耳其中未必有可用也且聞盜嫂而受金王乃踈平讓無知無知曰臣進奇謀之士誠足以利國耳且其小過豈妨公家之大務哉乃擢為護軍得施其策故范增疽發死而楚國亡閼氏開陳而漢軍全者平之謀也高祖棄陳平之小愆採六奇之大謀文侯捨吳起之小失而取五城之大功向使二主以其小過棄彼良材則魏國之存亡不可知漢楚之雄雌未可決也而吳起必埋名於貪淫陳平陷身於賄盜矣俗之觀士者見其威儀屑屑好行細潔乃謂英彥士有大趣不修容儀不惜小檢而謂之棄人是見朱橘一子蠹因剪樹而棄之覩縟錦一寸點乃全匹而燔之齊桓深知寧戚將任之以政群臣爭讒之曰寧戚衛人去齊不遠君可使人問之若果真賢用之未晚也公曰不然患其有小惡者民人知小惡忘其大美此世所以失天下之士也乃夜舉火而爵之以為卿相九合諸侯一匡天下桓公可謂善求士矣故仲尼見人一善而忘其百非鮑叔聞人一過而終身不忘夫子如斯之弘鮑叔如斯之隘也以是觀之聖哲之量相去遠矣牛躅之窪不生魴鱮巢幕之窠不容鵠卵崇山廓澤不辭污穢佐世良材不拘細行何者量小不足以包大形器大無分小瑕也人之情性皆有細短若其大略是也雖有小過不足以為纍若其大略非也雖有衡門小操未足與論大謀樊噲屠販之豎蕭曹斗筲之吏英布刑墨之隸周勃俳優之任其行皆中律其質則將才也張景陽郢中之大淫也而威諸侯顏濁鄒梁父之大盜也而為齊勳臣此皆有所短然而功名不朽者大略得也袁精目鮑焦立節抗行不食非義之食乃餓而死不能立功拯溺者小節不申而大節屈也伯夷叔齊冰清玉潔義不以為孤竹之嗣不食周粟餓死首陽楊朱全身養性去脛之一毛以利天下則不為也若此二子德非不茂行非不高亦能安治代紊蹈白刃而達功名乎此可以為百代之鎔軌不可居伊管之任也適才第二十七物有美惡施用有宜美不常珍惡不終棄紫貂白狐製以為裘鬱若慶雲皎如荊玉此毳衣之美也壓菅蒼蒯編以蓑芒葉微踈絫黯若朽穰此卉服之惡也裘蓑雖異被服實同美惡雖殊適用則均今處繡戶洞房則蓑不如裘被雪沐雨則裘不及蓑以此觀之適才所施隨時成務各有宜也伏臘合歡必歌採菱牽石拖舟則歌噓𡁎非無激楚之音然而棄不用者方引重抽力不如噓𡁎之宜也卞莊子之升殷庭也鳴佩趨蹌溫色怡聲及其摶虎必攘袂鼓肘瞋目震呼非不知溫顏下氣之美然而不能及者方格猛獸不如攘袂之宜也安陵神童通國之麗也八音繁會使以噭吹囋聲而人悅之則不及瞽師侏儒之美蛇𠾑之珠百代之傳寶以之彈鵄則不如泥丸之徑也棠溪之劍天下之銛也用之穫穗曾不如鉤鎌之功也此四者美不常珍惡不終廢用各有宜也昔野人棄子貢之辨而悅馬圉之辭越王退吹籟之音而好鄙野之聲非子貢不及馬圉吹籟不若野聲然而美不必合惡而見珍者物各有用也水火金土土穀六府異物而皆有施規矩權衡準繩六法殊形而各有任故伊尹之興土功也長脛者使之踏鍾強脊者使之負土眇目者使之準繩傴僂者使之塗地因事施用仍便效才各盡其分而立功焉商歌之士雞鳴之客才各有不施不可棄也若使寧子結客於孟常則未免追軍之至囚繫之辱也若使雞鳴託於齊桓必不能光輔於霸道九合諸侯也時須過關莫若雞鳴欲隆霸主莫若商歌商歌之雅而雞鳴之鄙雖美惡有殊至於適理排難其揆一也楚之市偷天下之大盜而能卻齊軍雖使孫吳用兵彼必與之拒戰未肯有望風而退也晉之叔魚一國之佞邪也而能歸季孫雖使甘蘇聘説彼必與之較辨不至恐懾而逃還也大盜讒佞民之殫害無用之人也苟有士術猶能為國興利除害矧乃明智鍊才其為大益豈可棄耶關睢興於鳥而為風之首美其𦿳而有別也鹿鳴興於獸而為雅之端嘉其得食而相呼也以夫鳥獸之醜苟有一善詩人歌詠以為美談奚況人之有善而可棄乎夫柳柏之斷也大者為之棟梁小者為之椽桁直者中繩曲者中鉤隨材所施未有可棄者是以君子善能拔士故無棄人良匠善能運釿故無棄材是以人物交泰各盡其分而立功焉詩云雖有絲麻無棄管蒯雖有薑姬無棄憔悴此之謂也
