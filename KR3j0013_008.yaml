body:
  text: 卷第八兵術第四十太古淳朴民心無欲淳澆則爭起而戰萌生焉神農氏弦木為弧剡木為矢弧矢之利以威天下其後蚩尤強暴好習攻戰銷金為刃割革為鉀而兵遂興矣黃帝戰于涿鹿顓頊爭於不周堯戰丹水舜征有苗夏討有扈殷攻葛伯周伐崇侯夫兵者凶器財用之蠹而民之殘也五帝三王弗能弭者所以禁暴而討亂非欲耗財以害民也然衆聚則財散鋒接則民殘勢之使然也故兵貴伐謀不重交刃百戰百勝非用兵之善也善用兵者不戰而勝善之善也王者之兵修正道而服人霸者之兵奇譎變而取勝夫將者國之安危民之性命不可不重故詔之於廟堂授之以斧鉞受命既已則設明衣鑿凶門臨軍之日則忘其親援鼓之時則忘其身用能無天於上無地於下無敵於前無顧於後以全國為重以智謀為先故將者必明天時辨地勢練人謀明天時者察七緯之情洞五行之趣聽八風之動鑒五雲之候辨地勢者識七舍之形別九地勢練人謀者抱五德之美握二柄之要五德者智信仁勇嚴也二柄者賞罰也智以能謀信以約束仁以愛人勇以陵弱嚴以鎮衆賞以勸功罰以懲忝過故智者變通運奇之府也兵者詭道而行以其制勝也是以萬弩齊彀孫臏之奇千牛俱奔田單之策囊土壅水韓信之權拽柴楊塵欒枝之譎舒車豕突尹子之術雲梯煙浮魯生之巧用奇出于不意少可以挫多弱可強況夫以以衆擊寡以明攻昧兵形象水水之行避高而就下兵之勢避實而擊虛避強而攻弱避治而取亂避鋭而擊衰故水因地而制形兵因敵而制勝則兵無成勢水無定形觀形而運奇隨勢而應變反經以為巧無形以成妙故風雨有形則可以帷幕捍寒暑無形不可以關鑰遏也是以善攻者敵不知其所守如畏雷電擊無常處善守者敵不知其所攻如尋寰中不見其際視吾之謀無畏敵堅視吾之堅無畏敵謀以此言之不可不知也夫將者以謀為本以仁為源謀以制敵仁以得人故能謀制敵者將也力能勝敵者卒也將以權決為本卒以齊力為先是以列宿滿天不及朧月形不一光不同也虎兕多力而受制於人者心不一力不濟也萬人離心不如百人同力千人𨔛戰不如十人俱至今求同心之衆必死之士在於仁恩洽而賞罰明胥靡者臨危難而不懼履冰火而如歸非輕死而樂傷仁恩驅之也將得衆心必與同患暑不張蓋寒不御裘所以均寒暑也隘險不乘丘陵必下所以齊勞逸也軍食熟然後敢食軍井通然後敢飲所以同飢渴也三軍合戰必立矢石之下所以共安危也故𨢿醪汪流軍士通醉溫辭一灑師人挾纊苟得衆心則人競趨死以此衆戰猶轉石下山決水赴壑孰能當之矣閲武第四十一司馬法曰國家雖大好戰則亡天下雖安忘戰必危亟戰則民凋不習則民怠凋非保全之術怠非擬寇之方故兵不妄動而習武不輟所以養民命而修戎備也孔子曰不教民戰是為棄之易曰君子修戎器以備不虞是以春搜夏苗秋獮冬狩皆於農隙以講武事三年而治兵習戰敵也出曰治兵始其事也入曰振旅言整衆也還歸而飲至告于廟所以昭文章明貴賤順少長辨等列習威儀夫三軍浩漫則立表號言不相聞故為鼓鐸以通其耳視不相見故制旌麾以宣其目若民不習戰則耳不聆鼓鐸之音目不察旌麾之號進退不應令踈數不成行故士未戰而震栗馬未馳而沐汗非其人怯而馬弱不習之所致也吳王宮人教之戰陳約之法令回還進退盡中規矩雖蹈水火而不顧者非其性勇而氣剛教習之所成也鏌鋣不為巧者鋭而為拙者鈍然而巧以生勝拙而之負者習與不習也闔閭習武試其民於五湖劍皆加肩流血不肯止勾踐習戰試其民於寢宮民爭入水火死者千餘遽擊金而退之豈其惡生而貪死賞罰明而教習至也是以蓬蒙善射不能用不調之弓造父善御不能策不服之馬般倕善斫不能運不利之釿孫吳善將不能戰不習之卒貔貅戾獸而黃帝教之戰鷹鸇鷙鳥而羅氏教之擊夫鳥獸無知之性猶隨人指授而能戰擊者教習之功也奚況國之士民而不習武乎故射御慣習至於馳獵則能擒獲教習之所致也若弗先習覆迭是懼奚遽望獲今以練卒與不練卒交鋒若胡越爭遊不競明矣是以先王因於間隟大閲簡衆㪨修戎器為國豫備也明權第四十二循理守常曰道臨危制變曰權權之為稱譬猶權衡也衡者測邪正之形權者揆輕重之勢量有輕重則形之於衡今加一環於衡左則右蹶加之於右則左蹶唯莫之動則平正矣人之於事臨危制變量有輕重平而行之亦猶此也古之權者審其輕重必當於理而後行焉易稱巽以行權語稱可以適道未可與權權者反於經而合於道反於義而後有善若唐棣之華反而更合也孝子之事親和顏卑體盡孝盡敬及其溺也則攬髮而拯之非敢侮慢以救死也故溺而捽父祝則名君勢不得已權之所設也慈愛者人之常情然大義滅親滅親益榮由於義也是故慈愛方義二者相權義重則親可滅若虞舜之放弟象傲周公之誅管叔石碏之殺子厚季友之鴆叔牙以義權親此其類也欺父矯君臣子悖行然舜娶不告弦高矯命者以絶祀之罪重於不告矯命之過輕於滅國權之義也夫有道則無權道失則權作道之於用猶衣冠之在身也權之輕重猶甲胄之衛體也介胄禦寇而不可常服權以理度而不可常用自非賢哲莫能處也貴速第四十三成務雖均機速為上決謀或同遲緩為下何者才能成功以速為貴智能決謀以疾為奇也善齊事者若救火拯溺明其謀者猶驥捷矢疾今焚燃熛室則飛馳灌之湍波漂人必奔遊拯之若穿井而救火則熛揚棟焚矣方鑿舟而拯溺則葬江魚之腹中矣驥所以見珍者以其日行千里也滿旬而取至則與駑馬均矣箭所以為貴者以其弦直而至也窮日而取至者則與不至者同矣智所以為妙者以其應時而知事過而後知則與無智者齊矣昔吳起相楚貴族攻之起欲討讎而插矢王尸陽虎在圍魯人出之虎欲報德而傷之以戈謀不斯須而讎德兩報其智可謂應時而知矣張祿之入秦魏冉悔不先索而後行故勢移而身逐朝錯之冗壖垣申屠悔不先斬而後奏故發憤而致死智不早決敗而方悔其智可謂與無智者同矣故有智而不能施非智也能施而不能應速者亦非智也唁曰力貴突智貴卒此之謂也觀量第四十四夫曲思於細者必忘其大鋭情於近者必略於遠由心不並持則事不兼通小有所係大必所忘也故仰而貫針望不見天俯而拾虱視不見地天地至大而不見者眸掩於針虱故也是以智者知小道之妨大務小察之傷大明捐棄細識舒散情性以斯觀之人有小察細計者知其必無避志廣度亦可知矣奚以明之夫覩僬僥之節知非防風之脛視象之牙知其大於豕也見狸之尾知其小於豹也故覩一可以知百觀此可以明彼是以蹄窪之內不生蛟龍培塿之上不植松柏非水土之性有所不生乃其營宇隘也數粒而炊析薪而爨非苟為艱難由性褊吝而細碎也項羽不學一藝韓信不營一餐非其心不愛藝口不嗜味由其性大不綴細業也晉文種米曾子植羊非性暗憃不辨方隅以其運大不習小務也智伯庖人亡炙一策而即知之韓魏將反而不能知邯鄲子陽園亡一桃而即覺之其自亡也而不能知斯皆鋭忘大者也夫釣者雖有籊竿纖綸芒鉤芳餌增以詹何之妙不能與罾罟爭多弋者挾繁弱之弓貫會稽之箭加以蒲苴之巧不能與罻羅競獲何者術小故也江河之流爛胔漂尸縱橫接連而人飲之者量大故也盆盂之水鼠尾一曳必嘔吐而棄之者量小故也枳棘之生數寸而柚枝櫲樟之植百尺而蒔柯其何故耶豈非質小者而枝條蔇之而體大者節目踈乎是以達者之懷則滉漾而無涯褊人之情必刻核而煩細自上觀之趨舍之迹寬隘之量斷可識矣
